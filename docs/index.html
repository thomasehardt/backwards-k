<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F4D3D">
<title>Backwards K</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#1F4D3D; --clay:#C17A4E; --cream:#F7F4EC; --ink:#16233A;
    --red:#C0392B; --amber:#E8A33D; --line: rgba(22,35,58,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--cream); font-family:'Inter',sans-serif;
    color:var(--ink); overscroll-behavior:none;
  }
  #app{ display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:480px; margin:0 auto; background:var(--cream); }

  .app-header{ background:var(--field); color:var(--cream); padding:calc(env(safe-area-inset-top) + 14px) 18px 12px; flex-shrink:0; }
  .matchup{ font-family:'Oswald',sans-serif; font-weight:600; font-size:19px; display:flex; align-items:baseline; justify-content:space-between; gap:8px;}
  .matchup input{ background:none; border:none; color:var(--cream); font-family:inherit; font-weight:600; font-size:inherit; width:42%; text-align:left; }
  .matchup input:last-child{ text-align:right; }
  .matchup .at{ color:var(--amber); font-size:13px; font-family:'Inter'; font-weight:500;}
  .meta-row{ display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#cfe0d6; margin-top:6px;}
  .inning-pill{ background:rgba(247,244,236,.12); border:1px solid rgba(247,244,236,.35); border-radius:20px; padding:2px 10px; font-family:'Oswald'; }

  .tabs{ display:flex; background:#0f2b21; flex-shrink:0; }
  .tab{ flex:1; text-align:center; padding:11px 0 9px; font-family:'Oswald'; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#9fbdae; cursor:pointer; border-bottom:3px solid transparent; }
  .tab.active{ color:var(--amber); border-bottom-color:var(--amber); }

  .screen{ flex:1; overflow-y:auto; display:none; -webkit-overflow-scrolling:touch; }
  .screen.active{ display:flex; flex-direction:column; }

  /* ---- team switch chip ---- */
  .team-switch{ display:flex; gap:8px; padding:10px 14px 4px; flex-shrink:0; }
  .team-chip{ flex:1; text-align:center; padding:7px 0; border-radius:8px; border:1.4px solid var(--field); font-family:'Oswald'; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--field); cursor:pointer;}
  .team-chip.on{ background:var(--field); color:var(--cream); }

  .inning-strip{ display:flex; gap:6px; overflow-x:auto; padding:6px 14px 4px; flex-shrink:0; }
  .inn-chip{ min-width:30px; text-align:center; padding:4px 0; border-radius:6px; font-family:'IBM Plex Mono'; font-size:12px; color:#7a8985; border:1px solid var(--line); cursor:pointer; }
  .inn-chip.on{ background:var(--amber); color:var(--ink); border-color:var(--amber); font-weight:600; }

  .grid-scroll{ flex:1; overflow-y:auto; padding-bottom:8px; }
  .lineup-row{ display:grid; grid-template-columns: 26px 1fr 44px; align-items:center; border-bottom:1px solid var(--line); }
  .lineup-row.active-batter{ background:rgba(232,163,61,.14); }
  .pos-num{ font-family:'IBM Plex Mono'; font-size:11px; color:#8a9691; text-align:center; }
  .player-cell{ padding:8px 4px; }
  .player-name{ font-family:'Inter'; font-weight:600; font-size:13px; }
  .player-line{ font-family:'IBM Plex Mono'; font-size:10px; color:#7a8985; margin-top:1px;}
  .cell{ display:flex; align-items:center; justify-content:center; padding:5px 0; }

  .diamond-btn{ width:36px; height:36px; position:relative; cursor:pointer; background:none; border:none; padding:0; }
  .diamond-btn svg{ width:100%; height:100%; display:block; }
  .diamond-outline{ fill:none; stroke:#aab8b2; stroke-width:1.4; }
  .diamond-outline.scored{ fill:rgba(232,163,61,.35); stroke:var(--amber); stroke-width:2; }
  .base-path{ fill:none; stroke:var(--field); stroke-width:2.6; stroke-linecap:round; }
  .out-mark{ font-family:'IBM Plex Mono'; font-weight:600; fill:var(--red); }
  .result-label{ position:absolute; bottom:-1px; left:50%; transform:translateX(-50%); font-family:'IBM Plex Mono'; font-size:8px; font-weight:600; color:var(--field); }
  .rbi-badge{ position:absolute; top:-3px; right:-3px; background:var(--red); color:#fff; font-family:'IBM Plex Mono'; font-size:8px; border-radius:50%; width:12px; height:12px; display:flex; align-items:center; justify-content:center; }

  .summary-row{ display:grid; grid-template-columns: 26px 1fr 44px; border-top:2px solid var(--ink); background:#efe9da; font-family:'IBM Plex Mono'; font-size:12px; padding:8px 0; flex-shrink:0;}
  .summary-row .lbl{ text-align:left; padding-left:8px; font-weight:600;}
  .summary-row .val{ text-align:center; }

  .now-batting{ flex-shrink:0; background:var(--ink); color:var(--cream); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; font-family:'Oswald'; padding-bottom:calc(env(safe-area-inset-bottom) + 10px); }
  .now-batting .hint{ font-size:10px; color:var(--amber); letter-spacing:.06em; text-transform:uppercase; }

  /* sheet */
  .sheet-backdrop{ position:fixed; inset:0; background:rgba(13,26,20,.55); display:flex; align-items:flex-end; z-index:20; }
  .sheet{ width:100%; max-width:480px; margin:0 auto; background:var(--cream); border-radius:20px 20px 0 0; padding:14px 18px calc(env(safe-area-inset-bottom) + 18px); box-shadow:0 -10px 30px rgba(0,0,0,.3); max-height:85vh; overflow-y:auto; }
  .sheet-handle{ width:36px; height:4px; background:var(--line); border-radius:3px; margin:0 auto 12px; }
  .sheet-title{ font-family:'Oswald'; font-weight:600; font-size:16px; }
  .sheet-sub{ font-family:'IBM Plex Mono'; font-size:11px; color:#6b7a75; margin-bottom:12px; }
  .group-label{ font-family:'IBM Plex Mono'; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#8a9691; margin:10px 0 6px; }
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ font-family:'Oswald'; font-size:13px; font-weight:500; padding:8px 14px; border-radius:8px; border:1.4px solid var(--ink); background:var(--cream); cursor:pointer; }
  .chip.hit{ border-color:var(--field); color:var(--field); }
  .chip.out{ border-color:var(--red); color:var(--red); }
  .chip.sel{ background:var(--ink); color:var(--cream); }
  .chip.hit.sel{ background:var(--field); }
  .chip.out.sel{ background:var(--red); }
  .stepper-row{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
  .stepper{ display:flex; align-items:center; gap:12px; }
  .stepper button{ width:30px; height:30px; border-radius:50%; border:1.4px solid var(--ink); background:#fff; font-size:16px; font-family:'Oswald'; }
  .stepper .n{ font-family:'IBM Plex Mono'; font-weight:600; font-size:15px; width:16px; text-align:center; }
  .scored-toggle{ display:flex; align-items:center; gap:8px; margin-top:14px; }
  .scored-toggle input{ width:18px; height:18px; }
  .sheet-actions{ display:flex; gap:10px; margin-top:18px; }
  .sheet-actions button{ flex:1; padding:12px; border-radius:10px; font-family:'Oswald'; font-size:13px; letter-spacing:.04em; text-transform:uppercase; border:none; }
  .btn-save{ background:var(--field); color:var(--cream); font-weight:600; }
  .btn-clear{ background:none; border:1.4px solid var(--line) !important; color:#6b7a75; }

  /* setup */
  .setup-pad{ padding:14px 18px 30px; }
  .field-group{ margin-bottom:12px; }
  .field-label{ font-family:'IBM Plex Mono'; font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:#6b7a75; margin-bottom:4px;}
  .field-input{ width:100%; border:1.4px solid var(--line); border-radius:8px; padding:8px 10px; font-family:'Inter'; font-size:13px; background:#fff; }
  .two-col{ display:flex; gap:10px; }
  .two-col .field-group{ flex:1; }
  .setup-team-toggle{ display:flex; gap:8px; margin:14px 0 6px; }
  .setup-lineup-row{ display:flex; align-items:center; gap:8px; padding:7px 2px; border-bottom:1px solid var(--line); }
  .bat-order{ width:18px; font-family:'IBM Plex Mono'; font-weight:600; color:var(--field); font-size:12px; }
  .setup-name-input{ flex:1; border:none; border-bottom:1px solid transparent; font-family:'Inter'; font-size:13px; font-weight:500; background:none; padding:3px 0;}
  .setup-name-input:focus{ border-bottom-color:var(--field); outline:none; }
  .setup-pos-input{ width:38px; border:1px solid var(--line); border-radius:6px; font-family:'IBM Plex Mono'; font-size:11px; text-align:center; padding:3px 0; color:var(--clay);}
  .remove-player{ color:#c3cdc8; font-size:16px; padding:0 4px; cursor:pointer; }
  .add-player{ margin-top:8px; text-align:center; font-family:'Oswald'; font-size:13px; color:var(--field); border:1.4px dashed var(--field); border-radius:10px; padding:9px; cursor:pointer;}

  /* box */
  .box-pad{ padding:14px 18px 30px; }
  .box-section-title{ font-family:'Oswald'; font-size:12.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--field); margin:14px 0 6px; padding-bottom:4px; border-bottom:2px solid var(--field); }
  table.box{ width:100%; border-collapse:collapse; font-family:'IBM Plex Mono'; font-size:11.5px; }
  table.box th{ text-align:center; font-weight:600; color:#6b7a75; padding:4px 2px; font-size:10px; }
  table.box th:first-child{ text-align:left; }
  table.box td{ text-align:center; padding:5px 2px; border-top:1px solid var(--line); }
  table.box td:first-child{ text-align:left; font-family:'Inter'; font-weight:500; font-size:12px; }
  .runline{ display:flex; gap:6px; margin-top:4px; }
  .runline .box-mini{ flex:1; text-align:center; background:#fff; border:1px solid var(--line); border-radius:6px; padding:6px 0; }
  .runline .box-mini .n{ font-size:16px; font-weight:600; color:var(--ink); display:block; font-family:'IBM Plex Mono';}
  .runline .box-mini .l{ font-size:9px; color:#8a9691; text-transform:uppercase; letter-spacing:.05em; }
  .install-note{ font-family:'IBM Plex Mono'; font-size:10.5px; color:#8a9691; text-align:center; padding:10px 18px 0; }
  @keyframes cartoonPulse{ 0%{ transform:scale(1); } 35%{ transform:scale(1.35); color:var(--amber); } 100%{ transform:scale(1); } }
  .cartoon-pulse{ display:inline-block; animation:cartoonPulse 0.5s ease; }
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="matchup">
      <input id="awayNameHdr" value="Visitors" readonly>
      <span class="at">at</span>
      <input id="homeNameHdr" value="Home" readonly>
    </div>
    <div class="meta-row">
      <span id="metaLine">JUL 6</span>
      <span class="inning-pill" id="inningPill">SETUP</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" data-screen="history">Games</div>
    <div class="tab active" data-screen="setup">Lineup</div>
    <div class="tab" data-screen="score">Score</div>
    <div class="tab" data-screen="box">Box</div>
    <div class="tab" data-screen="recap">Recap</div>
  </div>

  <div class="screen" id="history">
    <div class="box-pad">
      <button class="btn-save" style="width:100%; margin-bottom:20px; padding:14px; font-size:15px;" onclick="startNewGame()">+ Start New Game</button>
      <div class="box-section-title">Saved Games</div>
      <div id="gameHistoryList"></div>
    </div>
  </div>

  <div class="screen active" id="setup">
    <div class="setup-pad">
      <div class="two-col">
        <div class="field-group"><div class="field-label">Visitor</div><input class="field-input" id="awayName" value="Riverside"></div>
        <div class="field-group"><div class="field-label">Home</div><input class="field-input" id="homeName" value="Harbor"></div>
      </div>
      <div class="two-col">
        <div class="field-group"><div class="field-label">Weather</div><input class="field-input" id="weather" value="72° · clear"></div>
        <div class="field-group"><div class="field-label">Scorer</div><input class="field-input" id="scorer" value=""></div>
      </div>

      <div class="field-group" style="margin-top:16px; border:1px solid var(--amber); border-radius:10px; padding:12px; background:rgba(232,163,61,0.1);">
        <div class="field-label" style="color:var(--ink);">⚾ MLB API Sync</div>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
          <input type="date" id="mlbDate" class="field-input" style="flex:1;">
          <button id="mlbLoadBtn" class="btn-save" style="padding:8px 12px; font-size:11px; border-radius:6px;">Load Schedule</button>
        </div>
        <select id="mlbGameSelect" class="field-input" style="display:none; margin-bottom:8px;"></select>
        <button id="mlbSyncBtn" class="btn-save" style="display:none; width:100%; border-radius:6px;">Sync Lineups & Plays</button>
      </div>

      <div class="setup-team-toggle">
        <div class="team-chip on" data-setupteam="away" id="setupTabAway">Visitor lineup</div>
        <div class="team-chip" data-setupteam="home" id="setupTabHome">Home lineup</div>
      </div>
      <div id="lineupEditor"></div>
      <div class="add-player" id="addPlayerBtn">+ Add player</div>
    </div>
  </div>

  <div class="screen" id="score">
    <div class="team-switch">
      <div class="team-chip on" data-team="away" id="scoreTabAway">Visitor</div>
      <div class="team-chip" data-team="home" id="scoreTabHome">Home</div>
    </div>
    <div class="inning-strip" id="inningStrip"></div>
    <div class="grid-scroll" id="grid"></div>
    <div class="summary-row" id="summaryRow"></div>
    <div class="now-batting" id="nowBatting"></div>
  </div>

  <div class="screen" id="box">
    <div class="box-pad" id="boxContent"></div>
    <div class="install-note">Add to Home Screen from your browser's share menu to install.</div>
  </div>

  <div class="screen" id="recap">
    <div class="box-pad">
      <button class="btn-save" style="width:100%; margin-bottom:10px; padding:14px; font-size:15px;" id="generateRecapBtn">Generate Recap</button>
      <button class="btn-save" style="width:100%; margin-bottom:16px; padding:14px; font-size:15px; display:none; background:var(--amber); color:var(--ink);" id="watchCartoonBtn">▶ Watch the Replay</button>
      <div id="recapContent"></div>
    </div>
  </div>
</div>

<script>
/* ---------------- release notes ----------------
   Bump this list whenever a v*.*.* tag is cut (see CLAUDE.md release
   checklist) — it's the single source of truth for the app's own version
   number and for what the "What's new" prompt shows after an upgrade. Not
   tied to the Android versionCode/versionName scheme; this is purely the
   web-app-content version. */
const RELEASE_NOTES = [
  { version: '0.1.0', notes: [
    "Live scoring with the full paper-scorecard vocabulary — hits, walks, every out type, fielder assist sequences (6-3, 4-6-3, ...).",
    "Automatic runs, RBI, and box score (including errors), derived from a baserunning simulation instead of manual entry.",
    "Multiple games saved locally, browsable from a Games tab.",
    "Optional MLB Stats API sync to pull a real game's lineups and play-by-play into the scorecard.",
    "First Android build, distributed via a self-hosted F-Droid repo.",
  ]},
  { version: '0.2.0', notes: [
    "New Recap tab: non-LLM, template-based play-by-play recap generated from a finished game's at-bats.",
    "A fact-accuracy scorer checks the generated recap against the real game data — content recall/precision, result accuracy, scoring accuracy, and play ordering.",
    "Watch an animated cartoon replay of the game: runner tokens, ball trajectories, and synthesized sound effects, synced to the recap.",
  ]},
  { version: '0.3.0-alpha.1', notes: [
    "This \"what's new\" screen — you're looking at it.",
    "Nightly builds available for testing bleeding-edge changes between releases.",
  ]},
  { version: '0.3.0-alpha.2', notes: [
    "Fixed: this screen now also shows on a brand-new install (as a welcome, not just \"what's new\" after an upgrade) — first installs were silently skipping it, which meant the Recap tab and animated cartoon replay were easy to miss entirely.",
  ]},
  { version: '0.3.0-alpha.3', notes: [
    "Fixed a build issue where alpha.1 and alpha.2 were indistinguishable to Android/F-Droid's update mechanism — if you were stuck on alpha.1 or alpha.2 with no update showing up, this is why, and it's now fixed going forward.",
  ]},
  { version: '0.3.0-alpha.4', notes: [
    "Animated cartoon replay: reworked field layout (a real outfield now, not fielders crowded against second base), slower pacing, and new controls — jump to any half-inning, or step through one play at a time with rewind/fast-forward.",
  ]},
  { version: '0.3.0-alpha.5', notes: [
    "Fixed the infield diamond — it's grass with a dirt basepath track now, not a solid brown polygon.",
    "Added a live scoreboard to the cartoon replay: score, inning, and outs, with a little flair animation whenever a value changes.",
  ]},
];

/* ---------------- data model ---------------- */
const RESULTS = {
  '1B': {group:'hit', ab:true, hit:true, bases:1, label:'1B'},
  '2B': {group:'hit', ab:true, hit:true, bases:2, label:'2B'},
  '3B': {group:'hit', ab:true, hit:true, bases:3, label:'3B'},
  'HR': {group:'hit', ab:true, hit:true, bases:4, label:'HR'},
  'BB': {group:'onbase', ab:false, hit:false, label:'BB'},
  'HBP':{group:'onbase', ab:false, hit:false, label:'HBP'},
  'FC': {group:'onbase', ab:true, hit:false, label:'FC'},
  'E':  {group:'onbase', ab:true, hit:false, label:'E'},
  'K':  {group:'out', ab:true, hit:false, out:true, label:'K'},
  'KC': {group:'out', ab:true, hit:false, out:true, label:'K̶'},
  'GO': {group:'out', ab:true, hit:false, out:true, label:'GO'},
  'FO': {group:'out', ab:true, hit:false, out:true, label:'FO'},
  'DP': {group:'out', ab:true, hit:false, out:true, label:'DP'},
  'SAC':{group:'out', ab:false, hit:false, out:true, label:'SAC'},
  'L':  {group:'out', ab:true, hit:false, out:true, label:'L'},
  'F':  {group:'out', ab:true, hit:false, out:true, label:'F'},
};
const INNINGS = 9;
let game = null;
let pendingCell = null; // {team, playerId, inning}

function blankLineup(prefix){
  return [
    {id: prefix+'1', name:'', pos:'CF'},
    {id: prefix+'2', name:'', pos:'2B'},
    {id: prefix+'3', name:'', pos:'1B'},
    {id: prefix+'4', name:'', pos:'LF'},
    {id: prefix+'5', name:'', pos:'SS'},
    {id: prefix+'6', name:'', pos:'3B'},
    {id: prefix+'7', name:'', pos:'RF'},
    {id: prefix+'8', name:'', pos:'C'},
    {id: prefix+'9', name:'', pos:'P'},
  ];
}
function blankGame(){
  return {
    id: 'game_' + Date.now(),
    meta:{ away:'Visitors', home:'Home', date: new Date().toISOString().slice(0,10), weather:'', scorer:'' },
    lineups:{ away: blankLineup('a'), home: blankLineup('h') },
    // atbats.away[playerId][inning] = [{result, scored, rbi, fielding, computed, seq}, ...]
    // an array, not a single cell, so a batter who bats twice in one inning (batting
    // around) gets a second entry instead of silently overwriting the first.
    atbats:{ away:{}, home:{} },
    pbpSeq: 0, // monotonically increasing across the whole game; gives every at-bat a
               // true chronological position regardless of which player/inning it's under
    setupTeam:'away',
    scoreTeam:'away',
    activeInning:1,
  };
}

// Upconvert games saved before at-bats became arrays: {result,...} -> [{result,...,seq}]
function migrateAtbats(g){
  if(g.pbpSeq === undefined) g.pbpSeq = 0;
  let seq = g.pbpSeq;
  for(const team of ['away','home']){
    const teamAtbats = g.atbats[team] || {};
    for(const playerId in teamAtbats){
      const rows = teamAtbats[playerId];
      for(const inn in rows){
        const cell = rows[inn];
        if(cell && !Array.isArray(cell)){
          if(cell.seq === undefined) cell.seq = ++seq;
          rows[inn] = [cell];
        }
      }
    }
  }
  g.pbpSeq = seq;
  return g;
}

async function loadGame(){
  try{
    const val = localStorage.getItem('game:current');
    if(val) {
      let g = JSON.parse(val);
      if(!g.id) g.id = 'game_' + Date.now();
      return migrateAtbats(g);
    }
  }catch(e){ /* no saved game yet */ }
  return blankGame();
}

async function saveGame(){
  try{
    localStorage.setItem('game:current', JSON.stringify(game));
    let history = [];
    try{ history = JSON.parse(localStorage.getItem('game:history')||'[]'); }catch(e){}
    const idx = history.findIndex(g => g.id === game.id);
    if(idx >= 0) history[idx] = game;
    else history.unshift(game);
    localStorage.setItem('game:history', JSON.stringify(history));
    renderHistory();
  }
  catch(e){ console.error('save failed', e); }
}

function startNewGame(){
  game = blankGame();
  saveGame();
  renderHeader(); renderSetup(); renderScore(); renderBox(); renderRecap();
  document.querySelector('.tab[data-screen="setup"]').click();
}

function loadFromHistory(id){
  let history = [];
  try{ history = JSON.parse(localStorage.getItem('game:history')||'[]'); }catch(e){}
  const found = history.find(g => g.id === id);
  if(found) {
    game = migrateAtbats(found);
    saveGame();
    renderHeader(); renderSetup(); renderScore(); renderBox(); renderRecap();
    document.querySelector('.tab[data-screen="score"]').click();
  }
}

function renderHistory(){
  let history = [];
  try{ history = JSON.parse(localStorage.getItem('game:history')||'[]'); }catch(e){}
  const list = document.getElementById('gameHistoryList');
  if(!list) return;
  if(history.length===0){
    list.innerHTML = '<div style="font-size:12px; color:#8a9691;">No saved games yet.</div>';
    return;
  }
  list.innerHTML = history.map(g => `
    <div style="padding:12px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px; cursor:pointer; background:#fff;" onclick="loadFromHistory('${g.id}')">
      <div style="font-family:'Oswald'; font-size:15px; color:var(--ink);">${g.meta.away} @ ${g.meta.home}</div>
      <div style="font-family:'IBM Plex Mono'; font-size:11px; color:#6b7a75; margin-top:4px;">${g.meta.date} · Inn ${g.activeInning}</div>
    </div>
  `).join('');
}

/* ---------------- stats ---------------- */
function playerStats(team, playerId){
  const rows = game.atbats[team][playerId] || {};
  let AB=0,R=0,H=0,RBI=0;
  Object.values(rows).forEach(cells=>{
    (cells||[]).forEach(cell=>{
      if(!cell || !cell.result) return;
      const def = RESULTS[cell.result];
      if(def.ab) AB++;
      if(def.hit) H++;
      if(cell.scored) R++;
      RBI += (cell.rbi||0);
    });
  });
  return {AB,R,H,RBI};
}
function teamTotals(team){
  let AB=0,R=0,H=0,RBI=0,E=0;
  game.lineups[team].forEach(p=>{
    const s = playerStats(team,p.id);
    AB+=s.AB; R+=s.R; H+=s.H; RBI+=s.RBI;
    Object.values(game.atbats[team][p.id]||{}).forEach(cells => {
      (cells||[]).forEach(c => { if(c && c.result === 'E') E++; });
    });
  });
  return {AB,R,H,RBI,E};
}

function recalcInning(team, inn){
  // `bases[i]` holds a reference to the specific at-bat cell object of the runner on
  // that base (not just a playerId) — necessary now that a player can have more than
  // one cell in the same inning (batting around), so "who's on base" must point at
  // the exact plate appearance that put them there.
  let bases = [null, null, null];
  let outs = 0;
  const lineup = game.lineups[team];

  // Walk every at-bat recorded for this half-inning, across every player, in true
  // chronological order (seq) rather than lineup order — lineup order alone breaks
  // once a player bats more than once in the inning.
  let plays = [];
  lineup.forEach(p => {
    const cells = game.atbats[team][p.id]?.[inn] || [];
    cells.forEach(cell => plays.push(cell));
  });
  plays.sort((a,b) => (a.seq||0) - (b.seq||0));

  plays.forEach(cell => { if(cell.computed) { cell.scored = false; cell.rbi = 0; } });

  for(const cell of plays){
    if(outs >= 3) break;
    if(!cell.result) continue;

    const def = RESULTS[cell.result];
    let playRbi = 0;
    const score = (runnerCell) => {
      if(runnerCell && !runnerCell.scored) { runnerCell.scored = true; runnerCell.computed = true; }
      playRbi++;
    };

    if(def.group === 'hit') {
      let b = def.bases;
      if(b===4){ if(bases[2])score(bases[2]); if(bases[1])score(bases[1]); if(bases[0])score(bases[0]); score(cell); bases=[null,null,null]; }
      else if(b===3){ if(bases[2])score(bases[2]); if(bases[1])score(bases[1]); if(bases[0])score(bases[0]); bases=[null,null,cell]; }
      else if(b===2){ if(bases[2])score(bases[2]); if(bases[1])score(bases[1]); bases[2]=bases[0]; bases[1]=cell; bases[0]=null; }
      else if(b===1){ if(bases[2])score(bases[2]); bases[2]=bases[1]; bases[1]=bases[0]; bases[0]=cell; }
    } else if(def.group === 'onbase') {
      if(cell.result==='BB' || cell.result==='HBP') {
        if(bases[0]){ if(bases[1]){ if(bases[2]) score(bases[2]); bases[2]=bases[1]; } bases[1]=bases[0]; }
        bases[0]=cell;
      } else {
        if(bases[2]) score(bases[2]); bases[2]=bases[1]; bases[1]=bases[0]; bases[0]=cell;
      }
    } else if(def.group === 'out') {
      outs++;
      if(cell.result==='DP') outs++;
      if(cell.result==='SAC' && outs < 3) {
        if(bases[2]) score(bases[2]); bases[2]=bases[1]; bases[1]=bases[0]; bases[0]=null;
      }
    }
    if(cell.computed === undefined || cell.computed) { cell.rbi = playRbi; cell.computed = true; }
  }
}

/* ---------------- diamond svg ---------------- */
function diamondSVG(cell){
  const home=[17,30], first=[30,17], second=[17,4], third=[4,17];
  const outline = `M${home} L${first} L${second} L${third} Z`;
  let basePaths='', outLetter='', resultText='', scoredClass='';
  if(cell && cell.result){
    const def = RESULTS[cell.result];
    resultText = def.label;
    if(def.group==='hit'){
      const pts=[home,first,second,third,home];
      basePaths = `M${pts[0]} ` + pts.slice(1, def.bases+1).map(p=>`L${p}`).join(' ');
    } else if(def.group==='onbase'){
      basePaths = `M${home} L${first}`;
      if(cell.fielding && (def.label==='E' || def.label==='FC')) resultText = `${def.label}${cell.fielding.replace(/-/g,'')}`;
    } else if(def.group==='out'){
      outLetter = cell.fielding || def.label;
    }
  }
  if(cell && cell.scored) scoredClass='scored';
  return `
  <svg viewBox="0 0 34 34">
    <path class="diamond-outline ${scoredClass}" d="${outline}"/>
    ${basePaths?`<path class="base-path" d="${basePaths}"/>`:''}
    ${outLetter?`<text x="17" y="20" text-anchor="middle" class="out-mark" font-size="10">${outLetter}</text>`:''}
  </svg>
  ${resultText?`<div class="result-label">${resultText}</div>`:''}
  ${cell && cell.rbi ? `<div class="rbi-badge">${cell.rbi}</div>`:''}
  `;
}

/* ---------------- render: score ---------------- */
function renderInningStrip(){
  const strip = document.getElementById('inningStrip');
  let html='';
  for(let i=1;i<=INNINGS;i++){
    html += `<div class="inn-chip ${i===game.activeInning?'on':''}" data-inn="${i}">${i}</div>`;
  }
  strip.innerHTML = html;
  strip.querySelectorAll('.inn-chip').forEach(c=>{
    c.addEventListener('click', ()=>{ game.activeInning = +c.dataset.inn; saveGame(); renderScore(); renderHeader(); });
  });
}

function lastCell(team, playerId, inn){
  const cells = game.atbats[team][playerId]?.[inn];
  return cells && cells.length ? cells[cells.length-1] : null;
}

function nextEmptyPlayer(team){
  const lineup = game.lineups[team];
  for(const p of lineup){
    const cell = lastCell(team, p.id, game.activeInning);
    if(!cell || !cell.result) return p;
  }
  return null;
}

function renderScore(){
  document.getElementById('scoreTabAway').classList.toggle('on', game.scoreTeam==='away');
  document.getElementById('scoreTabHome').classList.toggle('on', game.scoreTeam==='home');
  renderInningStrip();

  const team = game.scoreTeam;
  const lineup = game.lineups[team];
  const nextBatter = nextEmptyPlayer(team);

  const grid = document.getElementById('grid');
  grid.innerHTML = lineup.map((p,i)=>{
    const cells = game.atbats[team][p.id]?.[game.activeInning] || [];
    const cell = cells.length ? cells[cells.length-1] : null;
    const isActive = nextBatter && nextBatter.id===p.id;
    return `
    <div class="lineup-row ${isActive?'active-batter':''}">
      <div class="pos-num">${i+1}</div>
      <div class="player-cell">
        <div class="player-name">${p.name || '(empty)'}</div>
        <div class="player-line">${p.pos||''}</div>
      </div>
      <div class="cell" style="position:relative;">
        <button class="diamond-btn" data-player="${p.id}">${diamondSVG(cell)}</button>
        ${cells.length > 1 ? `<div style="position:absolute; top:-2px; right:2px; background:var(--amber); color:var(--ink); font-size:9px; font-weight:700; border-radius:8px; padding:1px 5px;">${cells.length}×</div>` : ''}
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.diamond-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> openSheet(team, btn.dataset.player));
  });

  const tot = teamTotals(team);
  document.getElementById('summaryRow').innerHTML = `
    <div class="lbl">Inn ${game.activeInning} · Totals</div>
    <div class="val" style="font-size:11px;">AB ${tot.AB} · H ${tot.H} · R ${tot.R} · RBI ${tot.RBI}</div>
  `;

  const nb = document.getElementById('nowBatting');
  if(nextBatter){
    nb.innerHTML = `<div><div class="hint">Now batting</div><div class="name" style="font-size:14px;">${nextBatter.name||'—'} · ${nextBatter.pos||''}</div></div><div class="hint">Tap diamond ›</div>`;
  } else {
    nb.innerHTML = `<div><div class="hint">Inning ${game.activeInning} complete</div><div class="name" style="font-size:14px;">All batters recorded</div></div>`;
  }
}

/* ---------------- sheet ---------------- */
function openSheet(team, playerId){
  pendingCell = {team, playerId, inning: game.activeInning};
  const arr = game.atbats[team][playerId]?.[game.activeInning] || [];
  const editingIndex = arr.length - 1; // -1 means: no at-bat recorded yet this inning, Save creates the first one
  const existing = editingIndex >= 0 ? arr[editingIndex] : {result:null, scored:false, rbi:0, fielding:'', computed:true};
  const player = game.lineups[team].find(p=>p.id===playerId);

  let sel = existing.result;
  let scored = !!existing.scored;
  let rbi = existing.rbi || 0;
  let fielding = existing.fielding || '';
  let computed = existing.computed !== false;

  const backdrop = document.createElement('div');
  backdrop.className = 'sheet-backdrop';
  backdrop.innerHTML = `
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">${player.name || 'Batter'} — inning ${game.activeInning}${arr.length>1?` — at-bat ${editingIndex+1} of ${arr.length}`:''}</div>
      <div class="sheet-sub">${player.pos||''}</div>

      <div class="group-label">Hits</div>
      <div class="chip-row" data-group="hit">
        ${['1B','2B','3B','HR'].map(r=>`<div class="chip hit ${sel===r?'sel':''}" data-r="${r}">${r}</div>`).join('')}
      </div>
      <div class="group-label">On base</div>
      <div class="chip-row" data-group="onbase">
        ${['BB','HBP','FC','E'].map(r=>`<div class="chip ${sel===r?'sel':''}" data-r="${r}">${r}</div>`).join('')}
      </div>
      <div class="group-label">Out</div>
      <div class="chip-row" data-group="out">
        ${['K','KC','GO','FO','DP','SAC','L','F'].map(r=>`<div class="chip out ${sel===r?'sel':''}" data-r="${r}">${r==='KC'?'K̶':r}</div>`).join('')}
      </div>

      <div class="group-label" id="fieldingLabel" style="display:none; margin-top:14px;">Fielders (e.g. 6-3)</div>
      <div class="chip-row" id="fieldingChips" style="display:none;">
        <input type="text" id="fieldingInput" value="${fielding}" placeholder="Tap positions: 1 2 3..." style="width:100%; border:1.4px solid var(--ink); border-radius:8px; padding:8px 10px; font-family:'IBM Plex Mono'; font-size:13px; margin-bottom:8px;" readonly>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          ${[1,2,3,4,5,6,7,8,9].map(n=>`<div class="chip fielder-chip" style="padding:6px 12px;" data-pos="${n}">${n}</div>`).join('')}
          <div class="chip fielder-clear" style="padding:6px 12px;">Del</div>
        </div>
      </div>

      <div class="stepper-row">
        <div class="group-label" style="margin:0;">RBI</div>
        <div class="stepper">
          <button data-step="-1">−</button>
          <div class="n" id="rbiVal">${rbi}</div>
          <button data-step="1">+</button>
        </div>
      </div>
      <label class="scored-toggle">
        <input type="checkbox" id="scoredCheck" ${scored?'checked':''}>
        <span style="font-family:'Oswald'; font-size:13px;">Runner scored this inning</span>
      </label>

      ${arr.length > 0 ? `<div style="text-align:center; margin-top:10px;"><span id="newAtBatBtn" style="font-family:'Oswald'; font-size:12px; color:var(--field); text-decoration:underline; cursor:pointer;">+ Add another at-bat this inning (batting around)</span></div>` : ''}

      <div class="sheet-actions">
        <button class="btn-clear" id="clearBtn">Clear</button>
        <button class="btn-save" id="saveBtn">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  backdrop.addEventListener('click',(e)=>{ if(e.target===backdrop) backdrop.remove(); });

  const updateFieldingVis = () => {
    const fLabel = backdrop.querySelector('#fieldingLabel');
    const fChips = backdrop.querySelector('#fieldingChips');
    if(['GO','FO','DP','FC','E','L','F'].includes(sel)){
      fLabel.style.display = 'block'; fChips.style.display = 'flex';
    } else {
      fLabel.style.display = 'none'; fChips.style.display = 'none';
      backdrop.querySelector('#fieldingInput').value = '';
    }
  };
  updateFieldingVis();

  backdrop.querySelectorAll('.chip[data-r]').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      backdrop.querySelectorAll('.chip[data-r]').forEach(c=>c.classList.remove('sel'));
      chip.classList.add('sel');
      sel = chip.dataset.r;
      updateFieldingVis();
    });
  });

  const fInput = backdrop.querySelector('#fieldingInput');
  backdrop.querySelectorAll('.fielder-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      fInput.value = fInput.value ? fInput.value + '-' + btn.dataset.pos : btn.dataset.pos;
    });
  });
  backdrop.querySelector('.fielder-clear').addEventListener('click', () => { fInput.value = ''; });

  backdrop.querySelectorAll('[data-step]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      computed = false;
      rbi = Math.max(0, Math.min(4, rbi + (+btn.dataset.step)));
      backdrop.querySelector('#rbiVal').textContent = rbi;
    });
  });
  backdrop.querySelector('#scoredCheck').addEventListener('change', (e)=>{
    computed = false; scored = e.target.checked;
  });

  backdrop.querySelector('#newAtBatBtn')?.addEventListener('click', () => {
    if(!game.atbats[team][playerId]) game.atbats[team][playerId] = {};
    if(!game.atbats[team][playerId][game.activeInning]) game.atbats[team][playerId][game.activeInning] = [];
    game.pbpSeq = (game.pbpSeq||0) + 1;
    game.atbats[team][playerId][game.activeInning].push({ result:null, scored:false, rbi:0, fielding:'', computed:true, seq: game.pbpSeq });
    backdrop.remove();
    openSheet(team, playerId); // reopen editing the fresh blank entry just appended
  });

  backdrop.querySelector('#clearBtn').addEventListener('click', ()=>{
    const arr = game.atbats[team][playerId]?.[game.activeInning];
    if(arr && editingIndex >= 0 && editingIndex < arr.length){
      arr.splice(editingIndex, 1);
      if(arr.length === 0) delete game.atbats[team][playerId][game.activeInning];
    }
    recalcInning(team, game.activeInning);
    delete game.recap; // stale now that the underlying at-bats changed
    saveGame(); renderScore(); renderBox(); backdrop.remove();
  });
  backdrop.querySelector('#saveBtn').addEventListener('click', ()=>{
    if(!game.atbats[team][playerId]) game.atbats[team][playerId]={};
    const cells = game.atbats[team][playerId][game.activeInning] || (game.atbats[team][playerId][game.activeInning] = []);
    const newCell = { result: sel, scored: sel==='HR' ? true : scored, rbi, fielding: fInput.value, computed };
    if(editingIndex >= 0 && editingIndex < cells.length && cells[editingIndex].seq !== undefined){
      newCell.seq = cells[editingIndex].seq; // preserve original chronological position when correcting an existing at-bat
      cells[editingIndex] = newCell;
    } else if(editingIndex >= 0 && editingIndex < cells.length){
      game.pbpSeq = (game.pbpSeq||0) + 1;
      newCell.seq = game.pbpSeq;
      cells[editingIndex] = newCell;
    } else {
      game.pbpSeq = (game.pbpSeq||0) + 1;
      newCell.seq = game.pbpSeq;
      cells.push(newCell);
    }
    if(computed) recalcInning(team, game.activeInning);
    delete game.recap; // stale now that the underlying at-bats changed
    saveGame(); renderScore(); renderBox(); backdrop.remove();
  });
}

/* ---------------- recap: non-LLM play-by-play generation ----------------
   Template/rule-based narrative generation from game.atbats — no model calls.
   Pipeline: content selection + base simulation (buildHalfInningEvents, which
   doubles as recalcInning's logic but keeps player names for narration) ->
   discourse ordering (two-out / stranded-runner framing) -> template
   realization (BANK + realizePlay). Every sentence traces back to one at-bat
   cell, which is what makes the parallel `claims` list below possible — the
   eventual fact-accuracy scorer (see project tasks) checks those claims
   against game.atbats instead of trusting the prose. */

const RECAP_ORDINAL = ['','first','second','third','fourth','fifth','sixth','seventh','eighth','ninth'];
const RECAP_POS = {1:'pitcher',2:'catcher',3:'first baseman',4:'second baseman',5:'third baseman',
  6:'shortstop',7:'left fielder',8:'center fielder',9:'right fielder'};

function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function recapPick(rng, arr){ return arr[Math.floor(rng() * arr.length)]; }

const RECAP_BANK = {
  '1B': ['singled', 'poked a single through the infield', 'slapped a single into play', 'lined a single into the outfield'],
  '2B': ['doubled', 'ripped a double into the gap', 'stroked a two-bagger'],
  '3B': ['tripled', 'legged out a triple'],
  'HR': ['homered', 'went deep', 'sent one over the fence', 'crushed a home run'],
  'BB': ['walked', 'drew a walk', 'worked a base on balls'],
  'HBP': ['was hit by the pitch', 'got plunked'],
  'K': ['struck out swinging', 'struck out', 'went down swinging'],
  'KC': ['struck out looking', 'was caught looking for strike three', 'watched a third strike go by'],
};

function recapFielderPhrase(fielding){
  if(!fielding) return null;
  return fielding.split('-').map(n => RECAP_POS[n]).filter(Boolean);
}
function recapForceDescription(f){ return `force at ${f[0]==='second baseman'||f[0]==='shortstop' ? 'second' : 'first'}`; }

function realizeRecapPlay(rng, ev){
  const name = ev.batterName;
  let clause;
  if(ev.result in RECAP_BANK){
    clause = `${name} ${recapPick(rng, RECAP_BANK[ev.result])}`;
  } else if(ev.result === 'GO'){
    const f = recapFielderPhrase(ev.fielding);
    clause = f && f.length > 1
      ? recapPick(rng, [`${name} grounded out, ${f[0]} to ${f[1]}`, `${name} bounced one to the ${f[0]}, who threw to ${f[1]} for the out`, `${name} grounded to the ${f[0]}, thrown out at first`])
      : f ? `${name} grounded out to the ${f[0]}` : `${name} grounded out`;
  } else if(ev.result === 'FO'){
    const f = recapFielderPhrase(ev.fielding);
    clause = f ? `${name} flied out to the ${f[0]}` : `${name} flied out`;
  } else if(ev.result === 'L'){
    const f = recapFielderPhrase(ev.fielding);
    clause = f ? `${name} lined out to the ${f[0]}` : `${name} lined out`;
  } else if(ev.result === 'F'){
    const f = recapFielderPhrase(ev.fielding);
    clause = f ? `${name} popped out to the ${f[0]}` : `${name} popped out`;
  } else if(ev.result === 'DP'){
    const f = ev.fielding ? ` ${ev.fielding}` : '';
    clause = `${name} grounded into a${f} double play`;
  } else if(ev.result === 'SAC'){
    clause = `${name} laid down a sacrifice`;
  } else if(ev.result === 'FC'){
    const f = recapFielderPhrase(ev.fielding);
    clause = f ? `${name} reached on a fielder's choice, ${recapForceDescription(f)}` : `${name} reached on a fielder's choice`;
  } else if(ev.result === 'E'){
    const f = recapFielderPhrase(ev.fielding);
    clause = f ? `${name} reached on an error by the ${f[0]}` : `${name} reached on an error`;
  } else {
    clause = `${name} ${ev.result}`;
  }

  // Compare by id, not name — two blank/duplicate lineup names must not collide here.
  const others = ev.scoredRunners.filter(r => r.id !== ev.batterId).map(r => r.name);
  if(others.length === 1) clause += `, scoring ${others[0]}`;
  else if(others.length > 1) clause += `, scoring ${others.slice(0,-1).join(', ')} and ${others.slice(-1)}`;
  return clause;
}

// Walks the at-bat cells for one half-inning in true chronological order (by
// `seq`, not lineup order — a player can appear more than once if the team
// batted around) and replays the same baserunning simulation recalcInning
// uses, but keeps player names and produces one narratable event per play.
function buildRecapHalfInning(team, inn){
  const lineup = game.lineups[team];
  const nameOf = {}; lineup.forEach((p,i) => nameOf[p.id] = p.name || `Batter ${i+1}`);

  let plays = [];
  lineup.forEach(p => {
    const cells = game.atbats[team][p.id]?.[inn] || [];
    cells.forEach(cell => plays.push({ playerId: p.id, cell }));
  });
  plays.sort((a,b) => (a.cell.seq||0) - (b.cell.seq||0));

  let bases = [null,null,null], outs = 0;
  const events = [];
  const namesOnBases = () => bases.map(b => b ? nameOf[b.playerId] : null);
  for(const { playerId, cell } of plays){
    if(!cell.result) continue;
    const def = RESULTS[cell.result];
    const outsBefore = outs;
    const basesBefore = namesOnBases();
    let scoredRunners = [];
    let batterOutcome = 'out';
    const score = (runnerCell) => { if(runnerCell) scoredRunners.push({ id: runnerCell.playerId, name: nameOf[runnerCell.playerId] }); };
    // bases[] holds {playerId, ...} stand-ins so score() can resolve a name
    const runnerStub = { playerId };

    if(def.group === 'hit'){
      const b = def.bases;
      batterOutcome = b;
      if(b===4){ if(bases[2])score(bases[2]); if(bases[1])score(bases[1]); if(bases[0])score(bases[0]); score(runnerStub); bases=[null,null,null]; }
      else if(b===3){ if(bases[2])score(bases[2]); if(bases[1])score(bases[1]); if(bases[0])score(bases[0]); bases=[null,null,runnerStub]; }
      else if(b===2){ if(bases[2])score(bases[2]); if(bases[1])score(bases[1]); bases=[null,runnerStub,bases[0]]; }
      else if(b===1){ score(bases[2]); bases=[runnerStub,bases[0],bases[1]]; }
    } else if(def.group === 'onbase'){
      if(cell.result==='BB' || cell.result==='HBP'){
        batterOutcome = 1;
        if(bases[0]){ if(bases[1]){ if(bases[2]) score(bases[2]); bases[2]=bases[1]; } bases[1]=bases[0]; }
        bases[0]=runnerStub;
      } else if(cell.result==='FC'){
        batterOutcome = 1;
        outs++; bases=[runnerStub, bases[1], bases[2]];
      } else if(cell.result==='E'){
        batterOutcome = 1;
        score(bases[2]); bases[2]=bases[1]; bases[1]=bases[0]; bases[0]=runnerStub;
      }
    } else if(def.group === 'out'){
      outs++;
      if(cell.result==='DP'){ outs++; bases[0]=null; }
      if(cell.result==='SAC' && outs < 3){ score(bases[2]); bases[2]=bases[1]; bases[1]=bases[0]; bases[0]=null; }
    }

    events.push({ batterId: playerId, batterName: nameOf[playerId], result: cell.result, fielding: cell.fielding,
      outsBefore, scoredRunners, isThirdOut: outs >= 3, basesBefore, basesAfter: namesOnBases(), batterOutcome });
    if(outs >= 3) break;
  }
  const runsThisInning = events.reduce((s,e)=>s+e.scoredRunners.length,0);
  const strandedOnBase = bases.some(Boolean);
  return { events, runsThisInning, strandedOnBase };
}

function realizeRecapHalfInning(rng, team, teamName, inn){
  const { events, runsThisInning, strandedOnBase } = buildRecapHalfInning(team, inn);
  if(!events.length) return null;

  const sentences = [];
  const claims = [];
  events.forEach(ev => {
    let s = realizeRecapPlay(rng, ev);
    if(ev.outsBefore === 2 && !ev.isThirdOut) s = recapPick(rng, ['With two down, ', 'Two outs in, ']) + s;
    sentences.push(s);
    claims.push({ team, inning: inn, batterId: ev.batterId, batterName: ev.batterName, result: ev.result,
      fielding: ev.fielding, runsScored: ev.scoredRunners.length, scoredRunnerIds: ev.scoredRunners.map(r=>r.id) });
  });

  let text = sentences.join('. ') + '.';
  if(runsThisInning === 0){
    if(strandedOnBase) text += ' Inning over, runner left on.';
  } else {
    text = `${teamName} ${runsThisInning === 1 ? 'plates a run' : `plates ${runsThisInning} runs`} in the ${RECAP_ORDINAL[inn]}. ` + text;
  }
  return { text, claims };
}

function generateRecap(){
  const rng = mulberry32(Date.now() ^ 0);
  const innNums = [];
  for(const team of ['away','home']){
    Object.values(game.atbats[team]).forEach(rows => {
      Object.keys(rows).forEach(inn => innNums.push(+inn));
    });
  }
  const maxInning = innNums.length ? Math.max(...innNums) : 0;

  const lines = [];
  const claims = [];
  for(let inn = 1; inn <= maxInning; inn++){
    const top = realizeRecapHalfInning(rng, 'away', game.meta.away || 'Visitors', inn);
    const bot = realizeRecapHalfInning(rng, 'home', game.meta.home || 'Home', inn);
    if(top){ lines.push(`Top ${RECAP_ORDINAL[inn]}: ${top.text}`); claims.push(...top.claims); }
    if(bot){ lines.push(`Bottom ${RECAP_ORDINAL[inn]}: ${bot.text}`); claims.push(...bot.claims); }
  }
  return { text: lines.join('\n\n'), claims };
}

/* ---------------- recap accuracy scorer ----------------
   Checks generated recap TEXT against game.atbats ground truth. Deliberately
   does not consume generateRecap()'s internal `claims` list or any knowledge
   of which templates/phrases produced the text — it parses raw prose via a
   generic keyword vocabulary, so the same scorer can be pointed at output
   from a different (e.g. LLM-based) generator later for a fair comparison.
   Modeled on Wiseman/Shieber/Rush 2017 (RotoWire: content selection +
   relation generation) and Reiter/Thomson 2020 (NLG accuracy shared task).

   Known limitation: the keyword vocabulary below is broader than our own
   phrase bank but still finite — a generator using genuinely novel phrasing
   ("cranked a moonshot") will under-recall. This is an honest MVP, not a
   general-purpose information-extraction system. */

function groundTruthClaims(){
  const innNums = [];
  for(const team of ['away','home']){
    Object.values(game.atbats[team]).forEach(rows => {
      Object.keys(rows).forEach(inn => innNums.push(+inn));
    });
  }
  const maxInning = innNums.length ? Math.max(...innNums) : 0;
  const claims = [];
  for(let inn = 1; inn <= maxInning; inn++){
    for(const team of ['away','home']){
      const { events } = buildRecapHalfInning(team, inn);
      events.forEach(ev => {
        // Exclude the batter's own name from scoredNames: no reasonable recap
        // sentence restates "X homered, scoring X" — the batter's own run is
        // already implied by the verb. Matches the convention realizeRecapPlay
        // uses, and is the correct ground truth regardless of which generator
        // produced the text (nobody writes it the other way).
        const scoredNames = ev.scoredRunners.filter(r => r.id !== ev.batterId).map(r => r.name);
        claims.push({ team, inning: inn, batterName: ev.batterName, result: ev.result, scoredNames });
      });
    }
  }
  return claims;
}

const CLAIM_PATTERNS = [
  { result:'HR', re:/\bhome run\b|\bhomered\b|\bwent deep\b|\bover the fence\b|\bleft the yard\b|\bgrand slam\b|\bblasted\b|\bcranked\b|\bwent yard\b/i },
  { result:'3B', re:/\btripled\b|\btriple\b/i },
  { result:'2B', re:/\bdoubled\b|\bdouble\b(?!\s+play)|\btwo-bagger\b/i },
  { result:'1B', re:/\bsingled\b|\bsingle\b|\bbase hit\b|\broped a\b/i },
  { result:'BB', re:/\bwalked\b|\bwalk\b|\bbase on balls\b|\btook ball four\b/i },
  { result:'HBP', re:/\bhit by (the )?pitch\b|\bplunked\b|\bbeaned\b/i },
  { result:'DP', re:/\bdouble play\b/i },
  { result:'SAC', re:/\bsacrifice\b|\bsac bunt\b|\bsac fly\b/i },
  { result:'FC', re:/\bfielder'?s choice\b/i },
  { result:'E', re:/\berror\b/i },
  { result:'KC', re:/\blooking\b|\bthird strike\b/i },
  { result:'K', re:/\bstruck out\b|\bstrikeout\b|\bwhiffed\b|\bfanned\b|\bdown swinging\b|\bdown on strikes\b/i },
  { result:'L', re:/\blined out\b|\bline out\b/i },
  { result:'FO', re:/\bflied out\b|\bfly out\b|\bskied one\b/i },
  { result:'F', re:/\bpopped out\b|\bpop out\b|\bpopped it up\b/i },
  { result:'GO', re:/\bgrounded out\b|\bground out\b|\bthrown out at first\b|\bwho threw\b|\bgrounded (to|back)\b|\bchopped one\b/i },
];
function classifyResult(text){
  for(const {result, re} of CLAIM_PATTERNS){ if(re.test(text)) return result; }
  return null;
}

function extractClaimsFromText(text){
  // Same fallback naming convention buildRecapHalfInning uses for blank
  // lineup slots — searched per-team (scoped by the half-inning header)
  // rather than as one combined list, so "Batter 1" can't collide across
  // two teams that both have blank names at the same lineup slot.
  const namesFor = (team) => game.lineups[team]
    .map((p,i) => ({ id: p.id, name: p.name || `Batter ${i+1}` }))
    .sort((a,b) => b.name.length - a.name.length);

  const claims = [];
  const paragraphs = text.split(/\n\n+/);
  for(const para of paragraphs){
    const headerMatch = para.match(/^(Top|Bottom)\s+(\w+)\s*:\s*/i);
    if(!headerMatch) continue;
    const team = headerMatch[1].toLowerCase() === 'top' ? 'away' : 'home';
    const inning = RECAP_ORDINAL.indexOf(headerMatch[2].toLowerCase());
    if(inning < 1) continue;
    const body = para.slice(headerMatch[0].length);
    const teamPlayers = namesFor(team);

    const sentences = body.split(/(?<=\.)\s+/).map(s => s.trim()).filter(Boolean);
    for(const sentence of sentences){
      const scoringMatch = sentence.match(/,?\s*scoring\s+([^.]+)\.?$/i);
      let actionPart = sentence, scoredNames = [];
      if(scoringMatch){
        actionPart = sentence.slice(0, scoringMatch.index);
        scoredNames = scoringMatch[1].split(/,\s*|\s+and\s+/).map(n => n.trim()).filter(Boolean);
      }

      const batter = teamPlayers.find(p => actionPart.includes(p.name));
      if(!batter) continue;
      const result = classifyResult(actionPart);
      if(!result) continue;

      claims.push({ team, inning, batterName: batter.name, result, scoredNames });
    }
  }
  return claims;
}

function levenshtein(a, b){
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_,i) => [i, ...new Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j] = j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function matchClaims(groundTruth, extracted){
  const groupKey = c => `${c.team}|${c.inning}`;
  const gtGroups = {}, exGroups = {};
  groundTruth.forEach(c => { (gtGroups[groupKey(c)] ||= []).push(c); });
  extracted.forEach(c => { (exGroups[groupKey(c)] ||= []).push(c); });

  const matched = [], unmatchedGT = [], unmatchedEx = [];
  const allKeys = new Set([...Object.keys(gtGroups), ...Object.keys(exGroups)]);
  allKeys.forEach(key => {
    const gt = gtGroups[key] || [], ex = exGroups[key] || [];
    const n = Math.min(gt.length, ex.length);
    for(let i=0;i<n;i++) matched.push({ gt: gt[i], ex: ex[i] });
    for(let i=n;i<gt.length;i++) unmatchedGT.push(gt[i]);
    for(let i=n;i<ex.length;i++) unmatchedEx.push(ex[i]);
  });
  return { matched, unmatchedGT, unmatchedEx };
}

function scoreRecap(text){
  const gt = groundTruthClaims();
  const ex = extractClaimsFromText(text);
  const { matched, unmatchedGT, unmatchedEx } = matchClaims(gt, ex);

  const setEq = (a,b) => a.length===b.length && a.every(n=>b.includes(n));
  let resultCorrect = 0, scoringCorrect = 0;
  const details = matched.map(({gt, ex}) => {
    const resultOk = gt.result === ex.result;
    const scoringOk = setEq(gt.scoredNames||[], ex.scoredNames||[]);
    if(resultOk) resultCorrect++;
    if(scoringOk) scoringCorrect++;
    return { team: gt.team, inning: gt.inning, batterName: gt.batterName,
      groundTruthResult: gt.result, extractedResult: ex.result, resultOk, scoringOk };
  });

  const precision = ex.length ? matched.length / ex.length : (gt.length ? 0 : 1);
  const recall = gt.length ? matched.length / gt.length : (ex.length ? 0 : 1);
  const resultAccuracy = matched.length ? resultCorrect / matched.length : null;
  const scoringAccuracy = matched.length ? scoringCorrect / matched.length : null;

  const gtSeq = gt.map(c => `${c.team}:${c.inning}:${c.batterName}`);
  const exSeq = ex.map(c => `${c.team}:${c.inning}:${c.batterName}`);
  const orderingScore = 1 - levenshtein(gtSeq, exSeq) / Math.max(gtSeq.length, exSeq.length, 1);

  return {
    groundTruthCount: gt.length, extractedCount: ex.length, matchedCount: matched.length,
    precision, recall, resultAccuracy, scoringAccuracy, orderingScore,
    unmatchedGT, unmatchedEx, details,
  };
}

function renderRecap(){
  const content = document.getElementById('recapContent');
  const watchBtn = document.getElementById('watchCartoonBtn');
  if(!game.recap){
    content.innerHTML = `<div style="font-size:12px; color:#8a9691;">No recap generated yet. Score a few innings, then tap Generate Recap.</div>`;
    watchBtn.style.display = 'none';
    return;
  }
  watchBtn.style.display = 'block';
  const pct = (x) => x===null ? '—' : Math.round(x*100) + '%';
  const score = scoreRecap(game.recap.text);
  content.innerHTML = `
    <div style="white-space:pre-wrap; font-family:'IBM Plex Mono'; font-size:13px; line-height:1.6; margin-bottom:16px;">${game.recap.text.replace(/</g,'&lt;')}</div>
    <div class="box-section-title">Accuracy score</div>
    <table class="box">
      <tr><th>Content recall</th><td>${pct(score.recall)}</td></tr>
      <tr><th>Content precision</th><td>${pct(score.precision)}</td></tr>
      <tr><th>Result accuracy</th><td>${pct(score.resultAccuracy)}</td></tr>
      <tr><th>Scoring accuracy</th><td>${pct(score.scoringAccuracy)}</td></tr>
      <tr><th>Ordering score</th><td>${pct(score.orderingScore)}</td></tr>
    </table>
    <div style="font-size:11px; color:#8a9691; margin-top:8px;">${score.matchedCount}/${score.groundTruthCount} at-bats matched to text, ${score.extractedCount} claims extracted. Scored by parsing the text's prose against game data — not by trusting the generator's own bookkeeping.</div>
  `;
}

/* ---------------- cartoon replay: animation engine (geometric theme) ----------------
   Renders the same per-play events buildRecapHalfInning() already produces for the
   text recap, as a simple animated field: geometric SVG tokens for batter/runners/
   ball, synthesized Web Audio sound cues (no audio files), captions reusing
   realizeRecapPlay() so the wording matches the text recap exactly. This is the
   "engine" layer — a richer illustrated theme can render on top of the same event
   data and choreography later without changing any of this. */

// Home sits low in the viewBox, second base high, leaving a real outfield band
// (y ~15-70) above the infield for 7/8/9 instead of crowding them right against
// second base. Infielders (3/4/5/6) mirror symmetrically around the home-second
// axis (x=100).
const FIELD_PT = { home:[100,190], first:[155,135], second:[100,80], third:[45,135], pitcher:[100,155] };
const FIELD_CIRCUIT = [FIELD_PT.home, FIELD_PT.first, FIELD_PT.second, FIELD_PT.third]; // index 0..3; base 4 wraps to home
const FIELDER_POS = {
  1: FIELD_PT.pitcher, 2:[100,201], 3:[140,150], 4:[122,110], 5:[60,150], 6:[78,110],
  7:[30,60], 8:[100,20], 9:[170,60],
};

function cartoonFieldSVG(){
  const base = (pt) => `<rect x="${pt[0]-4}" y="${pt[1]-4}" width="8" height="8" fill="#fff"/>`;
  // Real infields are mostly grass — dirt is a track along the basepaths plus a
  // circle at home and at the mound, not a solid filled diamond.
  return `
  <svg viewBox="0 0 200 205" id="cartoonField" style="width:100%; display:block; background:#3f7d4f; border-radius:10px;">
    <path d="M14,68 Q100,2 186,68" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <line x1="${FIELD_PT.home[0]}" y1="${FIELD_PT.home[1]}" x2="190" y2="10" stroke="#fff" stroke-width="1"/>
    <line x1="${FIELD_PT.home[0]}" y1="${FIELD_PT.home[1]}" x2="10" y2="10" stroke="#fff" stroke-width="1"/>
    <circle cx="${FIELD_PT.home[0]}" cy="${FIELD_PT.home[1]}" r="30" fill="#c9a06a"/>
    <path d="M${FIELD_PT.home} L${FIELD_PT.first} L${FIELD_PT.second} L${FIELD_PT.third} Z" fill="none" stroke="#c9a06a" stroke-width="13" stroke-linejoin="round"/>
    <circle cx="${FIELD_PT.pitcher[0]}" cy="${FIELD_PT.pitcher[1]}" r="11" fill="#c9a06a"/>
    <circle cx="${FIELD_PT.pitcher[0]}" cy="${FIELD_PT.pitcher[1]}" r="3" fill="#fff" opacity="0.85"/>
    ${Object.values(FIELDER_POS).map(([x,y])=>`<circle r="5.5" cx="${x}" cy="${y}" fill="#1F4D3D" stroke="#fff" stroke-width="1"/>`).join('')}
    ${base(FIELD_PT.home)}${base(FIELD_PT.first)}${base(FIELD_PT.second)}${base(FIELD_PT.third)}
    <circle id="cartoonBall" cx="${FIELD_PT.pitcher[0]}" cy="${FIELD_PT.pitcher[1]}" r="2.5" fill="#fff" style="display:none;"/>
    <g id="cartoonRunners"></g>
  </svg>`;
}

let cartoonAudioCtx = null;
function getAudioCtx(){
  if(!cartoonAudioCtx) cartoonAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(cartoonAudioCtx.state === 'suspended') cartoonAudioCtx.resume();
  return cartoonAudioCtx;
}
function playTone(freq, duration, type, gainPeak, delay){
  delay = delay || 0;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(0, ctx.currentTime + delay);
  gain.gain.linearRampToValueAtTime(gainPeak, ctx.currentTime + delay + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration + 0.02);
}
function playNoiseBurst(duration, gainPeak){
  const ctx = getAudioCtx();
  const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * duration));
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(gainPeak, ctx.currentTime);
  src.connect(gain).connect(ctx.destination);
  src.start();
}
const SFX = {
  contact(){ playNoiseBurst(0.12, 0.25); playTone(700, 0.08, 'square', 0.08); },
  homeRun(){ playNoiseBurst(0.15, 0.3); [500,700,900,1200].forEach((f,i)=>playTone(f,0.15,'sine',0.1,i*0.08)); },
  strikeout(){ playTone(180, 0.25, 'sawtooth', 0.12); },
  walk(){ playTone(440, 0.1, 'sine', 0.08); },
  out(){ playTone(220, 0.15, 'square', 0.1); },
  cheer(){ playNoiseBurst(0.6, 0.15); },
};

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
// playList/halfInnings make the replay addressable by index — needed so the
// half-inning selector and rewind/fast-forward can jump anywhere and render a
// correct static snapshot, not just play forward from wherever it happens to be.
const CartoonPlayer = { playing:false, paused:true, stopRequested:false, playList:[], halfInnings:[], currentIndex:0, rng:null };
async function waitUnlessStopped(ms){
  await sleep(ms);
  if(CartoonPlayer.stopRequested) throw new Error('CARTOON_STOPPED');
}

function buildFullPlayList(){
  const innNums = [];
  for(const team of ['away','home']){
    Object.values(game.atbats[team]).forEach(rows => Object.keys(rows).forEach(inn => innNums.push(+inn)));
  }
  const maxInning = innNums.length ? Math.max(...innNums) : 0;
  const rng = mulberry32(Date.now() ^ 0);
  const list = [];
  let awayScore = 0, homeScore = 0;
  for(let inn=1; inn<=maxInning; inn++){
    for(const team of ['away','home']){
      const { events } = buildRecapHalfInning(team, inn);
      // caption is computed once here (not re-rolled on every snap/preview) so
      // scrubbing back and forth always shows the same wording for a given play.
      // Score is tracked as "before this play" — the after-value is always
      // derivable (before + this play's own runs) so it doesn't need storing.
      events.forEach(ev => {
        list.push({ team, inning: inn, ev, caption: realizeRecapPlay(rng, ev), awayScoreBefore: awayScore, homeScoreBefore: homeScore });
        const runs = ev.scoredRunners.length;
        if(team === 'away') awayScore += runs; else homeScore += runs;
      });
    }
  }
  return list;
}

// {away, home, outs, team, inning} snapshots for the scoreboard — "before" is
// what a jump/preview should show; "after" is what a play resolves to, shown
// with flair once the animation finishes.
function scoreboardBefore(entry){
  return { away: entry.awayScoreBefore, home: entry.homeScoreBefore, outs: entry.ev.outsBefore, team: entry.team, inning: entry.inning };
}
function scoreboardAfter(entry){
  const runs = entry.ev.scoredRunners.length;
  const def = RESULTS[entry.ev.result];
  const outsThisPlay = def.group === 'out' ? (entry.ev.result === 'DP' ? 2 : 1) : 0;
  return {
    away: entry.awayScoreBefore + (entry.team === 'away' ? runs : 0),
    home: entry.homeScoreBefore + (entry.team === 'home' ? runs : 0),
    outs: entry.ev.outsBefore + outsThisPlay,
    team: entry.team, inning: entry.inning,
  };
}

function pulseElement(el){
  if(!el) return;
  el.classList.remove('cartoon-pulse');
  void el.offsetWidth; // force reflow so the animation restarts even if already mid-pulse
  el.classList.add('cartoon-pulse');
}

function updateScoreboard(state, animate){
  const awayEl = document.getElementById('cartoonAwayScore');
  const homeEl = document.getElementById('cartoonHomeScore');
  const inningEl = document.getElementById('cartoonInningMini');
  const outsEl = document.getElementById('cartoonOutsDisplay');
  if(awayEl && awayEl.textContent !== String(state.away)){ awayEl.textContent = state.away; if(animate) pulseElement(awayEl); }
  if(homeEl && homeEl.textContent !== String(state.home)){ homeEl.textContent = state.home; if(animate) pulseElement(homeEl); }
  const inningText = `${state.team==='away'?'▲':'▼'}${state.inning}`;
  if(inningEl && inningEl.textContent !== inningText){ inningEl.textContent = inningText; if(animate) pulseElement(inningEl); }
  if(outsEl){
    const outs = Math.min(state.outs, 3);
    const dots = '●'.repeat(outs) + '○'.repeat(3 - outs);
    if(outsEl.textContent !== dots){ outsEl.textContent = dots; if(animate) pulseElement(outsEl); }
  }
}

function buildHalfInningList(playList){
  const halves = [];
  let lastKey = null;
  playList.forEach((p, i) => {
    const key = p.team + '|' + p.inning;
    if(key !== lastKey){
      halves.push({ team: p.team, inning: p.inning, startIndex: i,
        label: `${p.team==='away'?'Top':'Bottom'} ${RECAP_ORDINAL[p.inning]} — ${p.team==='away'?(game.meta.away||'Visitors'):(game.meta.home||'Home')}` });
      lastKey = key;
    }
  });
  return halves;
}

function initCartoonPlayer(){
  CartoonPlayer.playList = buildFullPlayList();
  CartoonPlayer.halfInnings = buildHalfInningList(CartoonPlayer.playList);
  CartoonPlayer.currentIndex = 0;
  CartoonPlayer.playing = false;
  CartoonPlayer.paused = true;
  CartoonPlayer.stopRequested = false;
}

let cartoonRunnerTokens = {}; // playerName -> svg circle element
function getOrCreateRunnerToken(name){
  if(cartoonRunnerTokens[name]) return cartoonRunnerTokens[name];
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  el.setAttribute('r', 5);
  el.setAttribute('fill', '#E8A33D');
  el.setAttribute('stroke', '#1F4D3D');
  el.setAttribute('stroke-width', '1.2');
  el.setAttribute('cx', FIELD_PT.home[0]-10);
  el.setAttribute('cy', FIELD_PT.home[1]+4);
  document.getElementById('cartoonRunners').appendChild(el);
  cartoonRunnerTokens[name] = el;
  return el;
}
function removeRunnerToken(name){
  const el = cartoonRunnerTokens[name];
  if(el){ el.remove(); delete cartoonRunnerTokens[name]; }
}
function resetCartoonField(){
  Object.keys(cartoonRunnerTokens).forEach(removeRunnerToken);
}

// Renders a static snapshot of the field at `index` — no animation, used by the
// half-inning selector and rewind/fast-forward to jump anywhere in the game.
function snapToIndex(index){
  const playList = CartoonPlayer.playList;
  if(!playList.length) return;
  index = Math.max(0, Math.min(index, playList.length - 1));
  CartoonPlayer.currentIndex = index;
  const entry = playList[index];
  const { ev, team, inning, caption } = entry;

  resetCartoonField();
  ev.basesBefore.forEach((name, i) => {
    if(!name) return;
    const el = getOrCreateRunnerToken(name);
    el.style.transition = 'none';
    el.setAttribute('cx', FIELD_CIRCUIT[i+1][0]);
    el.setAttribute('cy', FIELD_CIRCUIT[i+1][1]);
  });
  const ball = document.getElementById('cartoonBall');
  if(ball) ball.style.display = 'none';

  const half = CartoonPlayer.halfInnings.find(h => h.team===team && h.inning===inning);
  const label = document.getElementById('cartoonInningLabel');
  if(label) label.textContent = half ? half.label : 'Game Replay';
  const select = document.getElementById('cartoonHalfSelect');
  if(select && half){ const idx = CartoonPlayer.halfInnings.indexOf(half); if(idx>=0) select.value = String(idx); }

  const captionEl = document.getElementById('cartoonCaption');
  if(captionEl) captionEl.textContent = `Up next: ${caption}`;
  updateScoreboard(scoreboardBefore(entry), false);

  updatePlaybackButtons();
}

function updatePlaybackButtons(){
  const playBtn = document.getElementById('cartoonPlayPauseBtn');
  if(playBtn){
    if(CartoonPlayer.playing && !CartoonPlayer.paused) playBtn.textContent = '⏸ Pause';
    else if(CartoonPlayer.currentIndex >= CartoonPlayer.playList.length - 1 && !CartoonPlayer.playing) playBtn.textContent = '↻ Replay';
    else playBtn.textContent = '▶ Play';
  }
  const rewindBtn = document.getElementById('cartoonRewindBtn');
  const ffBtn = document.getElementById('cartoonFFBtn');
  if(rewindBtn) rewindBtn.disabled = CartoonPlayer.currentIndex <= 0;
  if(ffBtn) ffBtn.disabled = CartoonPlayer.currentIndex >= CartoonPlayer.playList.length - 1;
}

async function stopAnyPlaybackAndWait(){
  if(!CartoonPlayer.playing) return;
  CartoonPlayer.stopRequested = true;
  while(CartoonPlayer.playing) await sleep(30);
  CartoonPlayer.stopRequested = false;
}

async function cartoonRewind(){
  await stopAnyPlaybackAndWait();
  snapToIndex(CartoonPlayer.currentIndex - 1);
}
async function cartoonFastForward(){
  await stopAnyPlaybackAndWait();
  snapToIndex(CartoonPlayer.currentIndex + 1);
}

function moveToken(el, pt, duration){
  el.style.transition = `cx ${duration}ms ease, cy ${duration}ms ease`;
  el.setAttribute('cx', pt[0]); el.setAttribute('cy', pt[1]);
}
async function animateAlongCircuit(el, fromIdx, toIdx, legDuration){
  for(let i=fromIdx; i<toIdx; i++){
    const target = FIELD_CIRCUIT[(i+1) % 4];
    moveToken(el, target, legDuration);
    await waitUnlessStopped(legDuration);
  }
}

function fieldingTargetFor(ev){
  const def = RESULTS[ev.result];
  if(ev.fielding){
    const firstDigit = ev.fielding.split('-')[0];
    if(FIELDER_POS[firstDigit]) return FIELDER_POS[firstDigit];
  }
  if(ev.result === 'HR') return [100,-10]; // sails off the top of the field
  if(def.group === 'hit'){
    const gapByBases = { 1:[75,120], 2:[55,85], 3:[35,55] };
    return gapByBases[def.bases] || FIELDER_POS[8];
  }
  return FIELDER_POS[8];
}

async function animatePlay(entry){
  const { ev, caption } = entry;
  const captionEl = document.getElementById('cartoonCaption');
  if(captionEl) captionEl.textContent = caption;

  // snap pre-existing runners to their basesBefore position — no animation, they
  // were already there from the previous play's resolution
  ev.basesBefore.forEach((name, i) => {
    if(!name) return;
    const el = getOrCreateRunnerToken(name);
    el.style.transition = 'none';
    el.setAttribute('cx', FIELD_CIRCUIT[i+1][0]);
    el.setAttribute('cy', FIELD_CIRCUIT[i+1][1]);
  });

  const batterToken = getOrCreateRunnerToken(ev.batterName);
  batterToken.style.transition = 'none';
  batterToken.setAttribute('cx', FIELD_PT.home[0]-10);
  batterToken.setAttribute('cy', FIELD_PT.home[1]+4);

  const ball = document.getElementById('cartoonBall');
  ball.style.display = 'block';
  ball.style.transition = 'none';
  ball.setAttribute('cx', FIELD_PT.pitcher[0]);
  ball.setAttribute('cy', FIELD_PT.pitcher[1]);
  await sleep(50);

  moveToken(ball, FIELD_PT.home, 320);
  await waitUnlessStopped(340);

  const isStrikeout = ev.result === 'K' || ev.result === 'KC';
  const isWalk = ev.result === 'BB' || ev.result === 'HBP';

  if(isStrikeout){
    SFX.strikeout();
    batterToken.style.transition = 'transform 0.22s';
    batterToken.style.transformOrigin = 'center';
    batterToken.style.transform = 'rotate(-20deg)';
    await waitUnlessStopped(350);
    batterToken.style.transform = '';
    ball.style.display = 'none';
  } else if(isWalk){
    SFX.walk();
    await waitUnlessStopped(220);
    ball.style.display = 'none';
  } else {
    SFX.contact();
    moveToken(ball, fieldingTargetFor(ev), 650);
    await waitUnlessStopped(670);
    ball.style.display = 'none';
    if(ev.batterOutcome === 'out') SFX.out();
  }

  const scoredNames = new Set(ev.scoredRunners.map(r=>r.name));
  const movePromises = [];

  for(let i=0;i<3;i++){
    const name = ev.basesBefore[i];
    if(!name) continue;
    const afterIdx = ev.basesAfter.indexOf(name);
    if(afterIdx === i) continue; // stayed put
    const el = cartoonRunnerTokens[name];
    if(!el) continue;
    if(afterIdx >= 0){
      movePromises.push(animateAlongCircuit(el, i+1, afterIdx+1, 380));
    } else if(scoredNames.has(name)){
      movePromises.push(animateAlongCircuit(el, i+1, 4, 380).then(()=>{ SFX.cheer(); removeRunnerToken(name); }));
    } else {
      movePromises.push((async()=>{
        el.style.transition = 'opacity 0.4s'; el.style.opacity = '0.15';
        await waitUnlessStopped(420);
        removeRunnerToken(name);
      })());
    }
  }

  if(ev.batterOutcome === 'out'){
    movePromises.push((async()=>{
      batterToken.style.transition = 'opacity 0.4s'; batterToken.style.opacity = '0.15';
      await waitUnlessStopped(420);
      removeRunnerToken(ev.batterName);
    })());
  } else if(ev.batterOutcome === 4){
    movePromises.push(animateAlongCircuit(batterToken, 0, 4, 380).then(()=>{ SFX.homeRun(); SFX.cheer(); removeRunnerToken(ev.batterName); }));
  } else {
    movePromises.push(animateAlongCircuit(batterToken, 0, ev.batterOutcome, 380));
  }

  await Promise.all(movePromises);
  updateScoreboard(scoreboardAfter(entry), true);
  await waitUnlessStopped(520);
}

async function playCartoonFrom(startIndex){
  if(CartoonPlayer.playing) return;
  CartoonPlayer.playing = true;
  CartoonPlayer.stopRequested = false;
  CartoonPlayer.paused = false;
  getAudioCtx();
  updatePlaybackButtons();

  try {
    let lastHalfKey = null;
    for(let i = startIndex; i < CartoonPlayer.playList.length; i++){
      while(CartoonPlayer.paused && !CartoonPlayer.stopRequested) await sleep(120);
      if(CartoonPlayer.stopRequested) throw new Error('CARTOON_STOPPED');

      const entry = CartoonPlayer.playList[i];
      const halfKey = entry.team + '|' + entry.inning;
      // Only reset when crossing into a new half-inning during continuous forward
      // play — not on the very first iteration, since whatever called us (a jump
      // via snapToIndex, or a fresh open) already left the field in the correct
      // state for this exact play.
      if(i > startIndex && halfKey !== lastHalfKey) resetCartoonField();
      lastHalfKey = halfKey;

      const half = CartoonPlayer.halfInnings.find(h => h.team===entry.team && h.inning===entry.inning);
      const label = document.getElementById('cartoonInningLabel');
      if(label && half) label.textContent = half.label;
      const select = document.getElementById('cartoonHalfSelect');
      if(select && half){ const idx = CartoonPlayer.halfInnings.indexOf(half); if(idx>=0) select.value = String(idx); }

      CartoonPlayer.currentIndex = i;
      await animatePlay(entry);
      CartoonPlayer.currentIndex = Math.min(i + 1, CartoonPlayer.playList.length - 1);
    }
    const captionEl = document.getElementById('cartoonCaption');
    if(captionEl) captionEl.textContent = 'Replay complete.';
  } catch(e){
    if(e.message !== 'CARTOON_STOPPED') throw e;
  } finally {
    CartoonPlayer.playing = false;
    updatePlaybackButtons();
  }
}

function closeCartoon(){
  CartoonPlayer.stopRequested = true;
  CartoonPlayer.paused = true;
  const backdrop = document.getElementById('cartoonBackdrop');
  if(backdrop) backdrop.remove();
}

      </div>

  });

    if(CartoonPlayer.playing){
      CartoonPlayer.paused = !CartoonPlayer.paused;
      updatePlaybackButtons();
    } else {
      const atEnd = CartoonPlayer.currentIndex >= CartoonPlayer.playList.length - 1;
      const startAt = atEnd ? 0 : CartoonPlayer.currentIndex;
      if(atEnd) snapToIndex(0);
      playCartoonFrom(startAt);
    }
  });

  if(CartoonPlayer.playList.length) snapToIndex(0);
  else {
    const captionEl = document.getElementById('cartoonCaption');
    if(captionEl) captionEl.textContent = 'No plays recorded yet.';
  }
  updatePlaybackButtons();
}

/* ---------------- MLB API ---------------- */
document.getElementById('mlbDate').value = new Date().toISOString().slice(0,10);
document.getElementById('mlbLoadBtn').addEventListener('click', async () => {
  const date = document.getElementById('mlbDate').value;
  try {
    const res = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}`);
    const data = await res.json();
    const sel = document.getElementById('mlbGameSelect');
    sel.innerHTML = '<option value="">Select a game...</option>';
    if(data.dates.length > 0 && data.dates[0].games) {
      data.dates[0].games.forEach(g => {
        sel.innerHTML += `<option value="${g.gamePk}">${g.teams.away.team.name} @ ${g.teams.home.team.name}</option>`;
      });
      sel.style.display = 'block';
      document.getElementById('mlbSyncBtn').style.display = 'block';
    } else {
      sel.innerHTML = '<option value="">No games found.</option>';
      sel.style.display = 'block';
    }
  } catch(e) { alert('Error fetching MLB schedule'); }
});

document.getElementById('mlbSyncBtn').addEventListener('click', async () => {
  const pk = document.getElementById('mlbGameSelect').value;
  if(!pk) return;
  document.getElementById('mlbSyncBtn').textContent = 'Syncing...';
  try {
    const res = await fetch(`https://statsapi.mlb.com/api/v1.1/game/${pk}/feed/live`);
    const data = await res.json();
    const box = data.liveData.boxscore.teams;

    game.meta.away = box.away.team.teamName || box.away.team.name;
    game.meta.home = box.home.team.teamName || box.home.team.name;

    const popTeam = (tKey, sTeam) => {
      const t = box[tKey];
      if(!t.battingOrder || t.battingOrder.length===0) return;
      game.lineups[sTeam] = t.battingOrder.map(id => {
        const p = t.players['ID'+id];
        return { id: id.toString(), name: p.person.fullName, pos: p.position.abbreviation };
      });
    };
    popTeam('away', 'away');
    popTeam('home', 'home');

    game.atbats.away = {};
    game.atbats.home = {};
    game.pbpSeq = 0;

    const eventMap = {
      'Single':'1B', 'Double':'2B', 'Triple':'3B', 'Home Run':'HR',
      'Walk':'BB', 'Hit By Pitch':'HBP', 'Intent Walk':'BB',
      'Strikeout':'K', 'Strikeout Double Play':'DP',
      'Groundout':'GO', 'Flyout':'FO', 'Lineout':'L', 'Pop Out':'F',
      'Double Play':'DP', 'Grounded Into DP':'DP', 'Forceout':'FC',
      'Field Error':'E', 'Sac Bunt':'SAC', 'Sac Fly':'SAC', 'Fielders Choice Out':'FC', 'Fielders Choice':'FC'
    };

    if(data.liveData.plays && data.liveData.plays.allPlays) {
      // allPlays is already in true chronological order, so a batter who bats around
      // in the same inning just gets multiple entries pushed in the right sequence.
      data.liveData.plays.allPlays.forEach(play => {
        if(!play.about.isComplete) return;
        const inn = play.about.inning;
        const team = play.about.halfInning === 'top' ? 'away' : 'home';
        if(!play.matchup || !play.matchup.batter) return;
        const batterId = play.matchup.batter.id.toString();
        const event = play.result.event;

        if(eventMap[event]) {
          if(!game.atbats[team][batterId]) game.atbats[team][batterId] = {};
          if(!game.atbats[team][batterId][inn]) game.atbats[team][batterId][inn] = [];
          game.atbats[team][batterId][inn].push({
            result: eventMap[event],
            scored: (event === 'Home Run'),
            rbi: 0,
            fielding: '',
            computed: true,
            seq: ++game.pbpSeq,
          });
        }
      });
    }

    // Attempt auto-recalc of runs/RBI for each inning
    for(let i=1; i<=9; i++) {
      recalcInning('away', i);
      recalcInning('home', i);
    }

    if(data.liveData.linescore && data.liveData.linescore.currentInning) {
      game.activeInning = data.liveData.linescore.currentInning;
    }

    delete game.recap; // stale now that atbats have been replaced wholesale
    saveGame();
    renderSetup(); renderScore(); renderBox(); renderRecap();
    alert('Sync complete!');
  } catch(e) {
    console.error(e);
    alert('Error syncing MLB game. Are lineups posted yet?');
  }
  document.getElementById('mlbSyncBtn').textContent = 'Sync Lineups & Plays';
});

function checkForNewRelease(){
  const currentVersion = RELEASE_NOTES[RELEASE_NOTES.length-1].version;
  let lastSeen;
  try{ lastSeen = localStorage.getItem('lastSeenVersion'); }catch(e){ return; }
  if(lastSeen !== currentVersion){
    if(lastSeen){
      // upgrade from a known version: catch up on everything since then;
      // unrecognized lastSeen (e.g. a very old build) just shows the latest
      const idx = RELEASE_NOTES.findIndex(r => r.version === lastSeen);
      const newEntries = idx >= 0 ? RELEASE_NOTES.slice(idx+1) : [RELEASE_NOTES[RELEASE_NOTES.length-1]];
      if(newEntries.length) showWhatsNew(newEntries);
    } else {
      // First-ever launch — a fresh browser profile, or (importantly) a
      // native app install, which has its own separate localStorage even if
      // you've used the web version before. This is exactly when a "here's
      // what this app can do" intro is most useful, not least, so show the
      // latest entry as a welcome rather than staying silent.
      showWhatsNew([RELEASE_NOTES[RELEASE_NOTES.length-1]], 'Welcome to Backwards K');
    }
    try{ localStorage.setItem('lastSeenVersion', currentVersion); }catch(e){}
  }
}
