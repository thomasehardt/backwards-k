<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F4D3D">
<title>Backwards K</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#1F4D3D; --clay:#C17A4E; --cream:#F7F4EC; --ink:#16233A;
    --red:#C0392B; --amber:#E8A33D; --line: rgba(22,35,58,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--cream); font-family:'Inter',sans-serif;
    color:var(--ink); overscroll-behavior:none;
  }
  #app{ display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:480px; margin:0 auto; background:var(--cream); }

  .app-header{ background:var(--field); color:var(--cream); padding:calc(env(safe-area-inset-top) + 14px) 18px 12px; flex-shrink:0; }
  .matchup{ font-family:'Oswald',sans-serif; font-weight:600; font-size:19px; display:flex; align-items:baseline; justify-content:space-between; gap:8px;}
  .matchup input{ background:none; border:none; color:var(--cream); font-family:inherit; font-weight:600; font-size:inherit; width:42%; text-align:left; }
  .matchup input:last-child{ text-align:right; }
  .matchup .at{ color:var(--amber); font-size:13px; font-family:'Inter'; font-weight:500;}
  .meta-row{ display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#cfe0d6; margin-top:6px;}
  .inning-pill{ background:rgba(247,244,236,.12); border:1px solid rgba(247,244,236,.35); border-radius:20px; padding:2px 10px; font-family:'Oswald'; }

  .tabs{ display:flex; background:#0f2b21; flex-shrink:0; }
  .tab{ flex:1; text-align:center; padding:11px 0 9px; font-family:'Oswald'; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#9fbdae; cursor:pointer; border-bottom:3px solid transparent; }
  .tab.active{ color:var(--amber); border-bottom-color:var(--amber); }

  .screen{ flex:1; overflow-y:auto; display:none; -webkit-overflow-scrolling:touch; }
  .screen.active{ display:flex; flex-direction:column; }

  /* ---- team switch chip ---- */
  .team-switch{ display:flex; gap:8px; padding:10px 14px 4px; flex-shrink:0; }
  .team-chip{ flex:1; text-align:center; padding:7px 0; border-radius:8px; border:1.4px solid var(--field); font-family:'Oswald'; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--field); cursor:pointer;}
  .team-chip.on{ background:var(--field); color:var(--cream); }

  .inning-strip{ display:flex; gap:6px; overflow-x:auto; padding:6px 14px 4px; flex-shrink:0; }
  .inn-chip{ min-width:30px; text-align:center; padding:4px 0; border-radius:6px; font-family:'IBM Plex Mono'; font-size:12px; color:#7a8985; border:1px solid var(--line); cursor:pointer; }
  .inn-chip.on{ background:var(--amber); color:var(--ink); border-color:var(--amber); font-weight:600; }

  .grid-scroll{ flex:1; overflow-y:auto; padding-bottom:8px; }
  .lineup-row{ display:grid; grid-template-columns: 26px 1fr 44px; align-items:center; border-bottom:1px solid var(--line); }
  .lineup-row.active-batter{ background:rgba(232,163,61,.14); }
  .pos-num{ font-family:'IBM Plex Mono'; font-size:11px; color:#8a9691; text-align:center; }
  .player-cell{ padding:8px 4px; }
  .player-name{ font-family:'Inter'; font-weight:600; font-size:13px; }
  .player-line{ font-family:'IBM Plex Mono'; font-size:10px; color:#7a8985; margin-top:1px;}
  .cell{ display:flex; align-items:center; justify-content:center; padding:5px 0; }

  .diamond-btn{ width:36px; height:36px; position:relative; cursor:pointer; background:none; border:none; padding:0; }
  .diamond-btn svg{ width:100%; height:100%; display:block; }
  .diamond-outline{ fill:none; stroke:#aab8b2; stroke-width:1.4; }
  .diamond-outline.scored{ fill:rgba(232,163,61,.35); stroke:var(--amber); stroke-width:2; }
  .base-path{ fill:none; stroke:var(--field); stroke-width:2.6; stroke-linecap:round; }
  .out-mark{ font-family:'IBM Plex Mono'; font-weight:600; fill:var(--red); }
  .result-label{ position:absolute; bottom:-1px; left:50%; transform:translateX(-50%); font-family:'IBM Plex Mono'; font-size:8px; font-weight:600; color:var(--field); }
  .rbi-badge{ position:absolute; top:-3px; right:-3px; background:var(--red); color:#fff; font-family:'IBM Plex Mono'; font-size:8px; border-radius:50%; width:12px; height:12px; display:flex; align-items:center; justify-content:center; }

  .summary-row{ display:grid; grid-template-columns: 26px 1fr 44px; border-top:2px solid var(--ink); background:#efe9da; font-family:'IBM Plex Mono'; font-size:12px; padding:8px 0; flex-shrink:0;}
  .summary-row .lbl{ text-align:left; padding-left:8px; font-weight:600;}
  .summary-row .val{ text-align:center; }

  .now-batting{ flex-shrink:0; background:var(--ink); color:var(--cream); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; font-family:'Oswald'; padding-bottom:calc(env(safe-area-inset-bottom) + 10px); }
  .now-batting .hint{ font-size:10px; color:var(--amber); letter-spacing:.06em; text-transform:uppercase; }

  /* sheet */
  .sheet-backdrop{ position:fixed; inset:0; background:rgba(13,26,20,.55); display:flex; align-items:flex-end; z-index:20; }
  .sheet{ width:100%; max-width:480px; margin:0 auto; background:var(--cream); border-radius:20px 20px 0 0; padding:14px 18px calc(env(safe-area-inset-bottom) + 18px); box-shadow:0 -10px 30px rgba(0,0,0,.3); max-height:85vh; overflow-y:auto; }
  .sheet-handle{ width:36px; height:4px; background:var(--line); border-radius:3px; margin:0 auto 12px; }
  .sheet-title{ font-family:'Oswald'; font-weight:600; font-size:16px; }
  .sheet-sub{ font-family:'IBM Plex Mono'; font-size:11px; color:#6b7a75; margin-bottom:12px; }
  .group-label{ font-family:'IBM Plex Mono'; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#8a9691; margin:10px 0 6px; }
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ font-family:'Oswald'; font-size:13px; font-weight:500; padding:8px 14px; border-radius:8px; border:1.4px solid var(--ink); background:var(--cream); cursor:pointer; }
  .chip.hit{ border-color:var(--field); color:var(--field); }
  .chip.out{ border-color:var(--red); color:var(--red); }
  .chip.sel{ background:var(--ink); color:var(--cream); }
  .chip.hit.sel{ background:var(--field); }
  .chip.out.sel{ background:var(--red); }
  .stepper-row{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
  .stepper{ display:flex; align-items:center; gap:12px; }
  .stepper button{ width:30px; height:30px; border-radius:50%; border:1.4px solid var(--ink); background:#fff; font-size:16px; font-family:'Oswald'; }
  .stepper .n{ font-family:'IBM Plex Mono'; font-weight:600; font-size:15px; width:16px; text-align:center; }
  .scored-toggle{ display:flex; align-items:center; gap:8px; margin-top:14px; }
  .scored-toggle input{ width:18px; height:18px; }
  .sheet-actions{ display:flex; gap:10px; margin-top:18px; }
  .sheet-actions button{ flex:1; padding:12px; border-radius:10px; font-family:'Oswald'; font-size:13px; letter-spacing:.04em; text-transform:uppercase; border:none; }
  .btn-save{ background:var(--field); color:var(--cream); font-weight:600; }
  .btn-clear{ background:none; border:1.4px solid var(--line) !important; color:#6b7a75; }

  /* setup */
  .setup-pad{ padding:14px 18px 30px; }
  .field-group{ margin-bottom:12px; }
  .field-label{ font-family:'IBM Plex Mono'; font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:#6b7a75; margin-bottom:4px;}
  .field-input{ width:100%; border:1.4px solid var(--line); border-radius:8px; padding:8px 10px; font-family:'Inter'; font-size:13px; background:#fff; }
  .two-col{ display:flex; gap:10px; }
  .two-col .field-group{ flex:1; }
  .setup-team-toggle{ display:flex; gap:8px; margin:14px 0 6px; }
  .setup-lineup-row{ display:flex; align-items:center; gap:8px; padding:7px 2px; border-bottom:1px solid var(--line); }
  .bat-order{ width:18px; font-family:'IBM Plex Mono'; font-weight:600; color:var(--field); font-size:12px; }
  .setup-name-input{ flex:1; border:none; border-bottom:1px solid transparent; font-family:'Inter'; font-size:13px; font-weight:500; background:none; padding:3px 0;}
  .setup-name-input:focus{ border-bottom-color:var(--field); outline:none; }
  .setup-pos-input{ width:38px; border:1px solid var(--line); border-radius:6px; font-family:'IBM Plex Mono'; font-size:11px; text-align:center; padding:3px 0; color:var(--clay);}
  .remove-player{ color:#c3cdc8; font-size:16px; padding:0 4px; cursor:pointer; }
  .add-player{ margin-top:8px; text-align:center; font-family:'Oswald'; font-size:13px; color:var(--field); border:1.4px dashed var(--field); border-radius:10px; padding:9px; cursor:pointer;}

  /* box */
  .box-pad{ padding:14px 18px 30px; }
  .box-section-title{ font-family:'Oswald'; font-size:12.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--field); margin:14px 0 6px; padding-bottom:4px; border-bottom:2px solid var(--field); }
  table.box{ width:100%; border-collapse:collapse; font-family:'IBM Plex Mono'; font-size:11.5px; }
  table.box th{ text-align:center; font-weight:600; color:#6b7a75; padding:4px 2px; font-size:10px; }
  table.box th:first-child{ text-align:left; }
  table.box td{ text-align:center; padding:5px 2px; border-top:1px solid var(--line); }
  table.box td:first-child{ text-align:left; font-family:'Inter'; font-weight:500; font-size:12px; }
  .runline{ display:flex; gap:6px; margin-top:4px; }
  .runline .box-mini{ flex:1; text-align:center; background:#fff; border:1px solid var(--line); border-radius:6px; padding:6px 0; }
  .runline .box-mini .n{ font-size:16px; font-weight:600; color:var(--ink); display:block; font-family:'IBM Plex Mono';}
  .runline .box-mini .l{ font-size:9px; color:#8a9691; text-transform:uppercase; letter-spacing:.05em; }
  .install-note{ font-family:'IBM Plex Mono'; font-size:10.5px; color:#8a9691; text-align:center; padding:10px 18px 0; }
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="matchup">
      <input id="awayNameHdr" value="Visitors" readonly>
      <span class="at">at</span>
      <input id="homeNameHdr" value="Home" readonly>
    </div>
    <div class="meta-row">
      <span id="metaLine">JUL 6</span>
      <span class="inning-pill" id="inningPill">SETUP</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" data-screen="history">Games</div>
    <div class="tab active" data-screen="setup">Lineup</div>
    <div class="tab" data-screen="score">Score</div>
    <div class="tab" data-screen="box">Box</div>
  </div>

  <div class="screen" id="history">
    <div class="box-pad">
      <button class="btn-save" style="width:100%; margin-bottom:20px; padding:14px; font-size:15px;" onclick="startNewGame()">+ Start New Game</button>
      <div class="box-section-title">Saved Games</div>
      <div id="gameHistoryList"></div>
    </div>
  </div>

  <div class="screen active" id="setup">
    <div class="setup-pad">
      <div class="two-col">
        <div class="field-group"><div class="field-label">Visitor</div><input class="field-input" id="awayName" value="Riverside"></div>
        <div class="field-group"><div class="field-label">Home</div><input class="field-input" id="homeName" value="Harbor"></div>
      </div>
      <div class="two-col">
        <div class="field-group"><div class="field-label">Weather</div><input class="field-input" id="weather" value="72° · clear"></div>
        <div class="field-group"><div class="field-label">Scorer</div><input class="field-input" id="scorer" value=""></div>
      </div>

      <div class="setup-team-toggle">
        <div class="team-chip on" data-setupteam="away" id="setupTabAway">Visitor lineup</div>
        <div class="team-chip" data-setupteam="home" id="setupTabHome">Home lineup</div>
      </div>
      <div id="lineupEditor"></div>
      <div class="add-player" id="addPlayerBtn">+ Add player</div>
    </div>
  </div>

  <div class="screen" id="score">
    <div class="team-switch">
      <div class="team-chip on" data-team="away" id="scoreTabAway">Visitor</div>
      <div class="team-chip" data-team="home" id="scoreTabHome">Home</div>
    </div>
    <div class="inning-strip" id="inningStrip"></div>
    <div class="grid-scroll" id="grid"></div>
    <div class="summary-row" id="summaryRow"></div>
    <div class="now-batting" id="nowBatting"></div>
  </div>

  <div class="screen" id="box">
    <div class="box-pad" id="boxContent"></div>
    <div class="install-note">Add to Home Screen from your browser's share menu to install.</div>
  </div>
</div>

<script>
/* ---------------- data model ---------------- */
const RESULTS = {
  '1B': {group:'hit', ab:true, hit:true, bases:1, label:'1B'},
  '2B': {group:'hit', ab:true, hit:true, bases:2, label:'2B'},
  '3B': {group:'hit', ab:true, hit:true, bases:3, label:'3B'},
  'HR': {group:'hit', ab:true, hit:true, bases:4, label:'HR'},
  'BB': {group:'onbase', ab:false, hit:false, label:'BB'},
  'HBP':{group:'onbase', ab:false, hit:false, label:'HBP'},
  'FC': {group:'onbase', ab:true, hit:false, label:'FC'},
  'E':  {group:'onbase', ab:true, hit:false, label:'E'},
  'K':  {group:'out', ab:true, hit:false, out:true, label:'K'},
  'KC': {group:'out', ab:true, hit:false, out:true, label:'K̶'},
  'GO': {group:'out', ab:true, hit:false, out:true, label:'GO'},
  'FO': {group:'out', ab:true, hit:false, out:true, label:'FO'},
  'DP': {group:'out', ab:true, hit:false, out:true, label:'DP'},
  'SAC':{group:'out', ab:false, hit:false, out:true, label:'SAC'},
};
const INNINGS = 9;
let game = null;
let pendingCell = null; // {team, playerId, inning}

function blankLineup(prefix){
  return [
    {id: prefix+'1', name:'', pos:'CF'},
    {id: prefix+'2', name:'', pos:'2B'},
    {id: prefix+'3', name:'', pos:'1B'},
    {id: prefix+'4', name:'', pos:'LF'},
    {id: prefix+'5', name:'', pos:'SS'},
    {id: prefix+'6', name:'', pos:'3B'},
    {id: prefix+'7', name:'', pos:'RF'},
    {id: prefix+'8', name:'', pos:'C'},
    {id: prefix+'9', name:'', pos:'P'},
  ];
}
function blankGame(){
  return {
    id: 'game_' + Date.now(),
    meta:{ away:'Visitors', home:'Home', date: new Date().toISOString().slice(0,10), weather:'', scorer:'' },
    lineups:{ away: blankLineup('a'), home: blankLineup('h') },
    atbats:{ away:{}, home:{} }, // atbats.away[playerId][inning] = {result, scored, rbi}
    setupTeam:'away',
    scoreTeam:'away',
    activeInning:1,
  };
}

async function loadGame(){
  try{
    const val = localStorage.getItem('game:current');
    if(val) {
      let g = JSON.parse(val);
      if(!g.id) g.id = 'game_' + Date.now();
      return g;
    }
  }catch(e){ /* no saved game yet */ }
  return blankGame();
}

async function saveGame(){
  try{
    localStorage.setItem('game:current', JSON.stringify(game));
    let history = [];
    try{ history = JSON.parse(localStorage.getItem('game:history')||'[]'); }catch(e){}
    const idx = history.findIndex(g => g.id === game.id);
    if(idx >= 0) history[idx] = game;
    else history.unshift(game);
    localStorage.setItem('game:history', JSON.stringify(history));
    renderHistory();
  }
  catch(e){ console.error('save failed', e); }
}

function startNewGame(){
  game = blankGame();
  saveGame();
  renderHeader(); renderSetup(); renderScore(); renderBox();
  document.querySelector('.tab[data-screen="setup"]').click();
}

function loadFromHistory(id){
  let history = [];
  try{ history = JSON.parse(localStorage.getItem('game:history')||'[]'); }catch(e){}
  const found = history.find(g => g.id === id);
  if(found) {
    game = found;
    saveGame();
    renderHeader(); renderSetup(); renderScore(); renderBox();
    document.querySelector('.tab[data-screen="score"]').click();
  }
}

function renderHistory(){
  let history = [];
  try{ history = JSON.parse(localStorage.getItem('game:history')||'[]'); }catch(e){}
  const list = document.getElementById('gameHistoryList');
  if(!list) return;
  if(history.length===0){
    list.innerHTML = '<div style="font-size:12px; color:#8a9691;">No saved games yet.</div>';
    return;
  }
  list.innerHTML = history.map(g => `
    <div style="padding:12px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px; cursor:pointer; background:#fff;" onclick="loadFromHistory('${g.id}')">
      <div style="font-family:'Oswald'; font-size:15px; color:var(--ink);">${g.meta.away} @ ${g.meta.home}</div>
      <div style="font-family:'IBM Plex Mono'; font-size:11px; color:#6b7a75; margin-top:4px;">${g.meta.date} · Inn ${g.activeInning}</div>
    </div>
  `).join('');
}

/* ---------------- stats ---------------- */
function playerStats(team, playerId){
  const rows = game.atbats[team][playerId] || {};
  let AB=0,R=0,H=0,RBI=0;
  Object.values(rows).forEach(cell=>{
    if(!cell || !cell.result) return;
    const def = RESULTS[cell.result];
    if(def.ab) AB++;
    if(def.hit) H++;
    if(cell.scored) R++;
    RBI += (cell.rbi||0);
  });
  return {AB,R,H,RBI};
}
function teamTotals(team){
  let AB=0,R=0,H=0,RBI=0;
  game.lineups[team].forEach(p=>{
    const s = playerStats(team,p.id);
    AB+=s.AB; R+=s.R; H+=s.H; RBI+=s.RBI;
  });
  return {AB,R,H,RBI};
}

/* ---------------- diamond svg ---------------- */
function diamondSVG(cell){
  const home=[17,30], first=[30,17], second=[17,4], third=[4,17];
  const outline = `M${home} L${first} L${second} L${third} Z`;
  let basePaths='', outLetter='', resultText='', scoredClass='';
  if(cell && cell.result){
    const def = RESULTS[cell.result];
    resultText = def.label;
    if(def.group==='hit'){
      const pts=[home,first,second,third,home];
      basePaths = `M${pts[0]} ` + pts.slice(1, def.bases+1).map(p=>`L${p}`).join(' ');
    } else if(def.group==='onbase'){
      basePaths = `M${home} L${first}`;
    } else if(def.group==='out'){
      outLetter = def.label;
    }
  }
  if(cell && cell.scored) scoredClass='scored';
  return `
  <svg viewBox="0 0 34 34">
    <path class="diamond-outline ${scoredClass}" d="${outline}"/>
    ${basePaths?`<path class="base-path" d="${basePaths}"/>`:''}
    ${outLetter?`<text x="17" y="20" text-anchor="middle" class="out-mark" font-size="10">${outLetter}</text>`:''}
  </svg>
  ${resultText?`<div class="result-label">${resultText}</div>`:''}
  ${cell && cell.rbi ? `<div class="rbi-badge">${cell.rbi}</div>`:''}
  `;
}

/* ---------------- render: header ---------------- */
function renderHeader(){
  document.getElementById('awayNameHdr').value = game.meta.away || 'Visitors';
  document.getElementById('homeNameHdr').value = game.meta.home || 'Home';
  document.getElementById('metaLine').textContent = (game.meta.date||'') + (game.meta.weather?' · '+game.meta.weather:'');
  document.getElementById('inningPill').textContent = 'INN ' + game.activeInning;
}

/* ---------------- render: setup ---------------- */
function renderSetup(){
  document.getElementById('awayName').value = game.meta.away;
  document.getElementById('homeName').value = game.meta.home;
  document.getElementById('weather').value = game.meta.weather;
  document.getElementById('scorer').value = game.meta.scorer;

  document.getElementById('setupTabAway').classList.toggle('on', game.setupTeam==='away');
  document.getElementById('setupTabHome').classList.toggle('on', game.setupTeam==='home');

  const editor = document.getElementById('lineupEditor');
  const team = game.setupTeam;
  editor.innerHTML = game.lineups[team].map((p,i)=>`
    <div class="setup-lineup-row">
      <span class="bat-order">${i+1}</span>
      <input class="setup-name-input" placeholder="Player name" value="${p.name}" data-idx="${i}" data-field="name">
      <input class="setup-pos-input" value="${p.pos}" data-idx="${i}" data-field="pos">
      <span class="remove-player" data-idx="${i}">×</span>
    </div>
  `).join('');
  editor.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input', (e)=>{
      const idx = +e.target.dataset.idx, field = e.target.dataset.field;
      game.lineups[team][idx][field] = e.target.value;
      saveGame();
      renderHeader();
    });
  });
  editor.querySelectorAll('.remove-player').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = +btn.dataset.idx;
      game.lineups[team].splice(idx,1);
      saveGame(); renderSetup(); renderScore();
    });
  });
}

/* ---------------- render: score ---------------- */
function renderInningStrip(){
  const strip = document.getElementById('inningStrip');
  let html='';
  for(let i=1;i<=INNINGS;i++){
    html += `<div class="inn-chip ${i===game.activeInning?'on':''}" data-inn="${i}">${i}</div>`;
  }
  strip.innerHTML = html;
  strip.querySelectorAll('.inn-chip').forEach(c=>{
    c.addEventListener('click', ()=>{ game.activeInning = +c.dataset.inn; saveGame(); renderScore(); renderHeader(); });
  });
}

function nextEmptyPlayer(team){
  const lineup = game.lineups[team];
  for(const p of lineup){
    const rows = game.atbats[team][p.id]||{};
    if(!rows[game.activeInning] || !rows[game.activeInning].result) return p;
  }
  return null;
}

function renderScore(){
  document.getElementById('scoreTabAway').classList.toggle('on', game.scoreTeam==='away');
  document.getElementById('scoreTabHome').classList.toggle('on', game.scoreTeam==='home');
  renderInningStrip();

  const team = game.scoreTeam;
  const lineup = game.lineups[team];
  const nextBatter = nextEmptyPlayer(team);

  const grid = document.getElementById('grid');
  grid.innerHTML = lineup.map((p,i)=>{
    const rows = game.atbats[team][p.id] || {};
    const cell = rows[game.activeInning];
    const isActive = nextBatter && nextBatter.id===p.id;
    return `
    <div class="lineup-row ${isActive?'active-batter':''}">
      <div class="pos-num">${i+1}</div>
      <div class="player-cell">
        <div class="player-name">${p.name || '(empty)'}</div>
        <div class="player-line">${p.pos||''}</div>
      </div>
      <div class="cell">
        <button class="diamond-btn" data-player="${p.id}">${diamondSVG(cell)}</button>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.diamond-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> openSheet(team, btn.dataset.player));
  });

  const tot = teamTotals(team);
  document.getElementById('summaryRow').innerHTML = `
    <div class="lbl">Inn ${game.activeInning} · Totals</div>
    <div class="val" style="font-size:11px;">AB ${tot.AB} · H ${tot.H} · R ${tot.R} · RBI ${tot.RBI}</div>
  `;

  const nb = document.getElementById('nowBatting');
  if(nextBatter){
    nb.innerHTML = `<div><div class="hint">Now batting</div><div class="name" style="font-size:14px;">${nextBatter.name||'—'} · ${nextBatter.pos||''}</div></div><div class="hint">Tap diamond ›</div>`;
  } else {
    nb.innerHTML = `<div><div class="hint">Inning ${game.activeInning} complete</div><div class="name" style="font-size:14px;">All batters recorded</div></div>`;
  }
}

/* ---------------- sheet ---------------- */
function openSheet(team, playerId){
  pendingCell = {team, playerId, inning: game.activeInning};
  const rows = game.atbats[team][playerId] || {};
  const existing = rows[game.activeInning] || {result:null, scored:false, rbi:0};
  const player = game.lineups[team].find(p=>p.id===playerId);

  let sel = existing.result;
  let scored = !!existing.scored;
  let rbi = existing.rbi || 0;

  const backdrop = document.createElement('div');
  backdrop.className = 'sheet-backdrop';
  backdrop.innerHTML = `
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">${player.name || 'Batter'} — inning ${game.activeInning}</div>
      <div class="sheet-sub">${player.pos||''}</div>

      <div class="group-label">Hits</div>
      <div class="chip-row" data-group="hit">
        ${['1B','2B','3B','HR'].map(r=>`<div class="chip hit ${sel===r?'sel':''}" data-r="${r}">${r}</div>`).join('')}
      </div>
      <div class="group-label">On base</div>
      <div class="chip-row" data-group="onbase">
        ${['BB','HBP','FC','E'].map(r=>`<div class="chip ${sel===r?'sel':''}" data-r="${r}">${r}</div>`).join('')}
      </div>
      <div class="group-label">Out</div>
      <div class="chip-row" data-group="out">
        ${['K','KC','GO','FO','DP','SAC'].map(r=>`<div class="chip out ${sel===r?'sel':''}" data-r="${r}">${r==='KC'?'K̶':r}</div>`).join('')}
      </div>

      <div class="stepper-row">
        <div class="group-label" style="margin:0;">RBI</div>
        <div class="stepper">
          <button data-step="-1">−</button>
          <div class="n" id="rbiVal">${rbi}</div>
          <button data-step="1">+</button>
        </div>
      </div>
      <label class="scored-toggle">
        <input type="checkbox" id="scoredCheck" ${scored?'checked':''}>
        <span style="font-family:'Oswald'; font-size:13px;">Runner scored this inning</span>
      </label>

      <div class="sheet-actions">
        <button class="btn-clear" id="clearBtn">Clear</button>
        <button class="btn-save" id="saveBtn">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  backdrop.addEventListener('click',(e)=>{ if(e.target===backdrop) backdrop.remove(); });

  backdrop.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      backdrop.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
      chip.classList.add('sel');
      sel = chip.dataset.r;
    });
  });
  backdrop.querySelectorAll('[data-step]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      rbi = Math.max(0, Math.min(4, rbi + (+btn.dataset.step)));
      backdrop.querySelector('#rbiVal').textContent = rbi;
    });
  });
  backdrop.querySelector('#scoredCheck').addEventListener('change', (e)=>{ scored = e.target.checked; });

  backdrop.querySelector('#clearBtn').addEventListener('click', ()=>{
    if(!game.atbats[team][playerId]) game.atbats[team][playerId]={};
    delete game.atbats[team][playerId][game.activeInning];
    saveGame(); renderScore(); renderBox(); backdrop.remove();
  });
  backdrop.querySelector('#saveBtn').addEventListener('click', ()=>{
    if(!game.atbats[team][playerId]) game.atbats[team][playerId]={};
    game.atbats[team][playerId][game.activeInning] = { result: sel, scored: sel==='HR' ? true : scored, rbi };
    saveGame(); renderScore(); renderBox(); backdrop.remove();
  });
}

/* ---------------- render: box ---------------- */
function renderBox(){
  const box = document.getElementById('boxContent');
  const away = teamTotals('away'), home = teamTotals('home');
  const rowsFor = (team)=> game.lineups[team].map(p=>{
    const s = playerStats(team,p.id);
    return `<tr><td>${p.name||'—'}</td><td>${s.AB}</td><td>${s.R}</td><td>${s.H}</td><td>${s.RBI}</td></tr>`;
  }).join('');

  box.innerHTML = `
    <div class="runline">
      <div class="box-mini"><span class="n">${away.R}-${home.R}</span><span class="l">${game.meta.away} - ${game.meta.home}</span></div>
      <div class="box-mini"><span class="n">${away.H+home.H}</span><span class="l">Total hits</span></div>
    </div>
    <div class="box-section-title">${game.meta.away||'Visitor'} batting</div>
    <table class="box"><tr><th>Batter</th><th>AB</th><th>R</th><th>H</th><th>RBI</th></tr>${rowsFor('away')}</table>
    <div class="box-section-title">${game.meta.home||'Home'} batting</div>
    <table class="box"><tr><th>Batter</th><th>AB</th><th>R</th><th>H</th><th>RBI</th></tr>${rowsFor('home')}</table>
  `;
}

/* ---------------- tabs / wiring ---------------- */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.screen).classList.add('active');
  });
});

['awayName','homeName','weather','scorer'].forEach(id=>{
  document.getElementById(id).addEventListener('input', (e)=>{
    const key = id==='awayName'?'away': id==='homeName'?'home': id;
    game.meta[key] = e.target.value;
    saveGame(); renderHeader(); renderBox();
  });
});

document.getElementById('setupTabAway').addEventListener('click', ()=>{ game.setupTeam='away'; renderSetup(); });
document.getElementById('setupTabHome').addEventListener('click', ()=>{ game.setupTeam='home'; renderSetup(); });
document.getElementById('scoreTabAway').addEventListener('click', ()=>{ game.scoreTeam='away'; saveGame(); renderScore(); });
document.getElementById('scoreTabHome').addEventListener('click', ()=>{ game.scoreTeam='home'; saveGame(); renderScore(); });
document.getElementById('addPlayerBtn').addEventListener('click', ()=>{
  const team = game.setupTeam;
  const n = game.lineups[team].length+1;
  game.lineups[team].push({id: (team[0]+Date.now()), name:'', pos:''});
  saveGame(); renderSetup();
});

/* ---------------- init ---------------- */
(async function init(){
  game = await loadGame();
  renderHistory();
  renderHeader(); renderSetup(); renderScore(); renderBox();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
})();
</script>
</body>
</html>
